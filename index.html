<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Enhanced Tom Case</title>
    <style>
        /* Add CSS animations */
        @keyframes cardFlip {
            from { transform: rotateY(0); }
            to { transform: rotateY(180deg); }
        }

        @keyframes buttonPress {
            from { transform: scale(1); }
            to { transform: scale(0.95); }
        }

        @keyframes itemDrop {
            from { transform: translateY(0); }
            to { transform: translateY(50px); }
        }

        @keyframes particleBurst {
            0% { opacity: 1; }
            100% { opacity: 0; transform: scale(2); }
        }
    </style>
</head>
<body>
    <div class="cards">
        <div class="card" onclick="this.style.animation='cardFlip 0.6s';">Card 1</div>
        <div class="card" onclick="this.style.animation='cardFlip 0.6s';">Card 2</div>
    </div>
    <button onclick="this.style.animation='buttonPress 0.3s';">Press Me</button>
    <script>
        // Auto-save functionality
        function autoSave() {
            // Function to save data
            console.log('Auto-saving data...');
            // Add save logic here
        }

        setInterval(autoSave, 30000); // Auto-save every 30 seconds

        window.addEventListener('beforeunload', function (event) {
            autoSave();
        });
    </script>
</body>
</html>
