<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">

<title>TOM CASE REMASTER X</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

:root{
--bg:#0f1117;
--card:#1b1f2b;
--card2:#252b3b;
--gold:#ffd54f;
--green:#4caf50;
--red:#ff5252;
--blue:#42a5f5;
--text:#ffffff;
--muted:#9aa4b2;
--epic:#c158ff;
--legend:#ff9800;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
-webkit-tap-highlight-color:transparent;
user-select:none;
}

body{
background:#000;
overflow:hidden;
color:white;
padding-top:env(safe-area-inset-top);
padding-bottom:env(safe-area-inset-bottom);
overscroll-behavior:none;
touch-action:manipulation;
}

#app{
width:100%;
max-width:480px;
height:100vh;
margin:auto;
background:
linear-gradient(
180deg,
#0d1117 0%,
#10151d 25%,
#131a25 60%,
#0b0f14 100%
);
position:relative;
overflow:hidden;
}

.screen{
position:absolute;
inset:0;
display:none;
flex-direction:column;
opacity:0;
transform:translateX(20px);
transition:.25s;
}

.screen.active{
display:flex;
opacity:1;
transform:translateX(0);
}

.header{
height:68px;
min-height:68px;
background:rgba(0,0,0,.35);
backdrop-filter:blur(14px);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
border-bottom:1px solid rgba(255,255,255,.08);
z-index:20;
}

.title{
font-size:18px;
font-weight:800;
}

.balance{
background:linear-gradient(135deg,#ffc107,#ff9800);
padding:8px 14px;
border-radius:14px;
font-weight:800;
color:#222;
box-shadow:0 4px 15px rgba(255,193,7,.3);
}

.back{
background:none;
border:none;
color:white;
font-size:26px;
}

.content{
flex:1;
overflow-y:auto;
padding:16px;
padding-bottom:110px;
}

.logo{
width:170px;
height:170px;
margin:30px auto 20px;
border-radius:40px;
background:
linear-gradient(135deg,#ffcf5a,#ff9800);
display:flex;
align-items:center;
justify-content:center;
font-size:82px;
box-shadow:
0 20px 40px rgba(0,0,0,.45),
0 0 50px rgba(255,193,7,.2);
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

.bigtitle{
text-align:center;
font-size:36px;
font-weight:900;
}

.sub{
text-align:center;
margin-top:8px;
color:var(--muted);
margin-bottom:30px;
}

.btn{
width:100%;
border:none;
border-radius:18px;
padding:17px;
margin-bottom:12px;
font-weight:800;
font-size:15px;
color:white;
background:linear-gradient(135deg,#2d89ff,#006eff);
box-shadow:0 8px 24px rgba(0,110,255,.25);
transition:.15s;
}

.btn:active{
transform:scale(.97);
}

.btn.gold{
background:linear-gradient(135deg,#ffd54f,#ff9800);
color:#111;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.case{
background:linear-gradient(145deg,#202636,#171b26);
border-radius:22px;
overflow:hidden;
border:1px solid rgba(255,255,255,.05);
box-shadow:0 10px 25px rgba(0,0,0,.35);
}

.caseimg{
height:120px;
display:flex;
align-items:center;
justify-content:center;
font-size:58px;
background:
radial-gradient(circle at top,
rgba(255,255,255,.1),
transparent);
}

.casename{
padding:12px;
font-weight:800;
text-align:center;
}

.caseprice{
padding:10px;
text-align:center;
background:#11151f;
color:var(--gold);
font-weight:800;
}

.roulette{
height:210px;
margin-top:80px;
background:#0b0d12;
overflow:hidden;
position:relative;
border-top:4px solid var(--gold);
border-bottom:4px solid var(--gold);
}

.track{
height:100%;
display:flex;
align-items:center;
transition:9s cubic-bezier(.12,.9,.18,1);
}

.rItem{
min-width:150px;
height:150px;
background:white;
margin:0 10px;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:64px;
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.rItem::after{
content:'';
position:absolute;
inset:0;
border-radius:20px;
box-shadow:inset 0 0 25px rgba(255,255,255,.2);
}

.pointer{
position:absolute;
left:50%;
top:0;
bottom:0;
width:5px;
background:var(--gold);
transform:translateX(-50%);
box-shadow:0 0 20px var(--gold);
z-index:5;
}

.pointer::before{
content:'▼';
position:absolute;
top:-20px;
left:50%;
transform:translateX(-50%);
color:var(--gold);
font-size:24px;
}

.center{
text-align:center;
margin-top:40px;
}

.bigitem{
width:180px;
height:180px;
margin:auto;
border-radius:30px;
background:white;
display:flex;
align-items:center;
justify-content:center;
font-size:90px;
box-shadow:0 15px 40px rgba(0,0,0,.4);
}

.price{
font-size:30px;
font-weight:900;
margin-top:20px;
color:var(--gold);
}

.inventory{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.inv{
background:white;
border-radius:18px;
height:110px;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
position:relative;
color:black;
}

.sell{
position:absolute;
bottom:0;
left:0;
right:0;
background:#111;
color:#4caf50;
font-size:11px;
padding:5px;
text-align:center;
font-weight:700;
}

.profile{
background:linear-gradient(145deg,#1a2030,#10151f);
border-radius:28px;
padding:24px;
text-align:center;
border:1px solid rgba(255,255,255,.06);
}

.avatar{
width:100px;
height:100px;
border-radius:50%;
margin:auto;
background:#222;
display:flex;
align-items:center;
justify-content:center;
font-size:50px;
overflow:hidden;
border:4px solid var(--gold);
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;
}

.stat{
background:rgba(255,255,255,.04);
padding:14px;
border-radius:18px;
}

.stat b{
display:block;
font-size:22px;
margin-top:4px;
}

.toast{
position:fixed;
top:30px;
left:50%;
transform:translateX(-50%) translateY(-100px);
background:#111;
padding:14px 22px;
border-radius:20px;
border:1px solid rgba(255,255,255,.1);
transition:.3s;
z-index:999;
font-weight:700;
}

.toast.show{
transform:translateX(-50%) translateY(0);
}

.bottom{
position:absolute;
bottom:20px;
left:16px;
right:16px;
}

</style>
</head>

<body>

<div id="app">

<audio preload="auto" id="click" src="buttonclickrelease.mp3"></audio>
<audio preload="auto" id="win" src="gambling.mp3"></audio>

<div class="toast" id="toast"></div>

<!-- MAIN -->

<div class="screen active" id="main">

<div class="header">
<div class="title">🐻 TOM CASE</div>
<div class="balance" id="bal1">$100</div>
</div>

<div class="content">

<div class="logo">🐻</div>

<div class="bigtitle">TOM CASE</div>
<div class="sub">remaster x edition</div>

<button class="btn" onclick="go('cases')">
🎁 ОТКРЫТЬ КЕЙСЫ
</button>

<button class="btn gold" onclick="go('inventory')">
🎒 ИНВЕНТАРЬ
</button>

<button class="btn" onclick="go('profile')">
👤 ПРОФИЛЬ
</button>

<button class="btn" onclick="daily()">
🎁 ЕЖЕДНЕВНЫЙ БОНУС
</button>

</div>

</div>

<!-- CASES -->

<div class="screen" id="cases">

<div class="header">
<button class="back" onclick="go('main')">←</button>
<div class="title">КЕЙСЫ</div>
<div class="balance" id="bal2">$100</div>
</div>

<div class="content">
<div class="grid" id="casesGrid"></div>
</div>

</div>

<!-- OPEN -->

<div class="screen" id="open">

<div class="header">
<div class="title">🎰 открытие...</div>
</div>

<div class="roulette">
<div class="pointer"></div>
<div class="track" id="track"></div>
</div>

<div class="center">
<div style="color:#aaa" id="openText">
крутим...
</div>
</div>

</div>

<!-- RESULT -->

<div class="screen" id="result">

<div class="header">
<div class="title">🎉 ВЫПАЛО</div>
</div>

<div class="content">

<div class="center">

<div class="bigitem" id="resIcon">📦</div>

<div style="font-size:32px;font-weight:900;margin-top:24px"
id="resName">
ITEM
</div>

<div class="price" id="resPrice">
$0
</div>

</div>

<div class="bottom">

<button class="btn gold" onclick="sellCurrent()">
💰 ПРОДАТЬ
</button>

<button class="btn" onclick="keepCurrent()">
🎒 ЗАБРАТЬ
</button>

</div>

</div>

</div>

<!-- INV -->

<div class="screen" id="inventory">

<div class="header">
<button class="back" onclick="go('main')">←</button>
<div class="title">ИНВЕНТАРЬ</div>
<div class="balance" id="bal3">$100</div>
</div>

<div class="content">
<div class="inventory" id="inv"></div>
</div>

</div>

<!-- PROFILE -->

<div class="screen" id="profile">

<div class="header">
<button class="back" onclick="go('main')">←</button>
<div class="title">ПРОФИЛЬ</div>
<div class="balance" id="bal4">$100</div>
</div>

<div class="content">

<div class="profile">

<div class="avatar" id="avatar">
👤
</div>

<div style="font-size:28px;font-weight:900;margin-top:16px"
id="pname">
игрок
</div>

<div style="color:#888;margin-top:4px"
id="pid">
id
</div>

<div class="stats">

<div class="stat">
кейсов
<b id="scases">0</b>
</div>

<div class="stat">
заработано
<b id="searned">$0</b>
</div>

<div class="stat">
уровень
<b id="slvl">1</b>
</div>

<div class="stat">
предметов
<b id="sitems">0</b>
</div>

</div>

</div>

</div>

</div>

</div>

<script>

const tg = window.Telegram?.WebApp;

if(tg){
tg.ready();
tg.expand();
}

const STORAGE = "tomcase_remaster_x";

let state = {
balance:100,
inventory:[],
stats:{
cases:0,
earned:0,
level:1
},
daily:0
};

const CASES = [

{
name:"ШКОЛЬНЫЙ",
price:5,
icon:"🎒",
items:[
{name:"Линейка",icon:"📏",price:1,color:"#aaa",chance:60},
{name:"Нож",icon:"🔪",price:12,color:"#ff5252",chance:30},
{name:"Телефон",icon:"📱",price:90,color:"#42a5f5",chance:9},
{name:"ТОМ",icon:"🐻",price:400,color:"#ffd54f",chance:1}
]
},

{
name:"КРИПТА",
price:20,
icon:"₿",
items:[
{name:"DOGE",icon:"🐕",price:30,color:"#aaa",chance:50},
{name:"Bitcoin",icon:"₿",price:150,color:"#ff9800",chance:35},
{name:"NFT",icon:"🖼️",price:1000,color:"#c158ff",chance:15}
]
},

{
name:"ЛЕГЕНДА",
price:50,
icon:"👑",
items:[
{name:"Меч",icon:"⚔️",price:100,color:"#aaa",chance:60},
{name:"Дракон",icon:"🐉",price:500,color:"#ff5252",chance:30},
{name:"Артефакт",icon:"✨",price:5000,color:"#ffd54f",chance:10}
]
}

];

function save(){
localStorage.setItem(STORAGE,JSON.stringify(state));
}

function load(){

try{
const s = JSON.parse(localStorage.getItem(STORAGE));

if(s){
state=s;
}
}catch(e){}

}

function toast(t){

const el=document.getElementById("toast");

el.innerText=t;

el.classList.add("show");

setTimeout(()=>{
el.classList.remove("show");
},2200);

}

function play(id){

const a=document.getElementById(id);

if(!a)return;

a.currentTime=0;

a.play().catch(()=>{});

}

let current="main";

function go(id){

play("click");

document.querySelectorAll(".screen")
.forEach(s=>{
s.classList.remove("active");
});

document.getElementById(id)
.classList.add("active");

current=id;

update();

}

function update(){

document.querySelectorAll(".balance")
.forEach(e=>{
e.innerText="$"+state.balance.toFixed(2);
});

document.getElementById("scases").innerText=
state.stats.cases;

document.getElementById("searned").innerText=
"$"+state.stats.earned.toFixed(0);

document.getElementById("slvl").innerText=
state.stats.level;

document.getElementById("sitems").innerText=
state.inventory.length;

renderInv();

save();

}

function renderCases(){

const grid=document.getElementById("casesGrid");

grid.innerHTML="";

CASES.forEach((c,i)=>{

const d=document.createElement("div");

d.className="case";

d.onclick=()=>openCase(i);

d.innerHTML=`

<div class="caseimg">
${c.icon}
</div>

<div class="casename">
${c.name}
</div>

<div class="caseprice">
$${c.price}
</div>

`;

grid.appendChild(d);

});

}

let currentItem=null;
let opening=false;

function openCase(i){

if(opening)return;

const c=CASES[i];

if(state.balance<c.price){

toast("❌ мало денег");

return;
}

opening=true;

state.balance-=c.price;

state.stats.cases++;

update();

go("open");

const items=c.items;

const track=document.getElementById("track");

track.innerHTML="";

track.style.transition="none";
track.style.transform="translateX(0px)";

let sum=0;

const rnd=Math.random()*100;

let winner=items[0];

for(let item of items){

sum+=item.chance;

if(rnd<=sum){

winner=item;

break;

}

}

currentItem=winner;

const winIndex=45;

for(let i=0;i<70;i++){

const item=
i===winIndex
? winner
: items[Math.floor(Math.random()*items.length)];

const div=document.createElement("div");

div.className="rItem";

div.style.borderBottom=
`8px solid ${item.color}`;

div.innerText=item.icon;

track.appendChild(div);

}

setTimeout(()=>{

const itemW=170;

const pos=-(winIndex*itemW)+140;

track.style.transition=
"transform 9s cubic-bezier(.12,.9,.18,1)";

track.style.transform=
`translateX(${pos}px)`;

},50);

setTimeout(()=>{

play("win");

showResult();

opening=false;

},9200);

}

function showResult(){

document.getElementById("resIcon")
.innerText=currentItem.icon;

document.getElementById("resName")
.innerText=currentItem.name;

document.getElementById("resPrice")
.innerText="$"+currentItem.price;

go("result");

}

function keepCurrent(){

state.inventory.push({
...currentItem,
uid:Date.now()
});

toast("🎒 предмет сохранён");

update();

go("cases");

}

function sellCurrent(){

state.balance+=currentItem.price;

state.stats.earned+=currentItem.price;

toast("💰 продано");

update();

go("cases");

}

function renderInv(){

const inv=document.getElementById("inv");

inv.innerHTML="";

if(state.inventory.length<=0){

inv.innerHTML=
`
<div style="
grid-column:1/-1;
text-align:center;
padding:60px;
color:#666;
">
инвентарь пуст 🎒
</div>
`;

return;
}

state.inventory
.slice()
.reverse()
.forEach(it=>{

const d=document.createElement("div");

d.className="inv";

d.style.borderBottom=
`7px solid ${it.color}`;

d.innerHTML=`

${it.icon}

<div class="sell">
$${it.price}
</div>

`;

inv.appendChild(d);

});

}

function daily(){

const now=Date.now();

if(now-state.daily<86400000){

toast("⏳ уже забрано");

return;
}

state.daily=now;

state.balance+=50;

state.stats.earned+=50;

play("win");

toast("🎁 +50$");

update();

}

window.addEventListener("error",e=>{

console.error(e);

toast("⚠️ ошибка");

});

window.onload=()=>{

load();

renderCases();

update();

if(tg?.initDataUnsafe?.user){

const u=tg.initDataUnsafe.user;

document.getElementById("pname")
.innerText=u.first_name||"игрок";

document.getElementById("pid")
.innerText=u.id||"id";

if(u.photo_url){

document.getElementById("avatar")
.innerHTML=
`<img src="${u.photo_url}">`;

}

}

};

</script>

</body>
</html>
