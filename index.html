<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ЕХАЛО ACE ATTORNEY: ДЕЛО КОПИИ ИГРЫ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;font-family:'Trebuchet MS',sans-serif;overflow:hidden;color:#fff;user-select:none}
#game{width:100vw;height:100vh;position:relative;overflow:hidden;cursor:pointer}

/* === COURTROOM BACKGROUND === */
.court-bg{position:absolute;inset:0;overflow:hidden}
.court-bg .sky{position:absolute;top:0;left:0;right:0;height:45%;
  background:linear-gradient(180deg,#1a1028 0%,#2a1840 40%,#3d2050 100%)}
.court-bg .emblem{position:absolute;top:15px;left:50%;transform:translateX(-50%);
  width:120px;height:120px;background:radial-gradient(circle,#d4af37 0%,#8a7020 70%,transparent 100%);
  border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:1}
.court-bg .emblem::before{content:'⚖';font-size:60px;color:#1a0f04;text-shadow:2px 2px 4px rgba(0,0,0,0.5)}
.court-bg .wall{position:absolute;top:45%;left:0;right:0;height:25%;
  background:linear-gradient(180deg,#2a1a0a 0%,#1a0f04 100%);
  border-top:3px solid #d4af37;border-bottom:3px solid #d4af37}
.court-bg .floor{position:absolute;top:70%;left:0;right:0;bottom:0;
  background:linear-gradient(180deg,#5c3d1f 0%,#3d2817 40%,#1a0f06 100%);
  transform:perspective(600px) rotateX(25deg);transform-origin:top}
.court-bg .floor::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent 0,transparent 80px,rgba(0,0,0,0.2) 80px,rgba(0,0,0,0.2) 82px)}
.court-bg .pillar{position:absolute;top:10%;width:70px;height:60%;
  background:linear-gradient(90deg,#1a0f04 0%,#3d2817 30%,#5c3d1f 50%,#3d2817 70%,#1a0f04 100%);
  border:2px solid #d4af37;border-bottom:none;z-index:1}
.court-bg .pillar.l{left:2%}.court-bg .pillar.r{right:2%}
.court-bg .pillar::after{content:'';position:absolute;top:-12px;left:-8px;right:-8px;height:16px;
  background:linear-gradient(180deg,#d4af37,#8a7020);border:2px solid #5c3d1f}

/* === STANDS === */
.stand{position:absolute;bottom:180px;width:280px;height:80px;z-index:5}
.stand-body{position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:240px;height:70px;
  background:linear-gradient(180deg,#5c3d1f 0%,#3d2817 50%,#1a0f04 100%);
  border:3px solid #d4af37;border-radius:4px 4px 0 0;
  box-shadow:0 4px 15px rgba(0,0,0,0.6),inset 0 2px 0 rgba(255,255,255,0.1)}
.stand-body::before{content:'';position:absolute;top:8px;left:8px;right:8px;bottom:8px;
  border:1px solid rgba(212,175,55,0.4);border-radius:2px}
.stand-label{position:absolute;top:8px;left:50%;transform:translateX(-50%);
  color:#d4af37;font-size:13px;font-weight:bold;letter-spacing:2px;text-transform:uppercase}
.prosecution-stand{left:3%}
.defense-stand{right:3%}
.witness-stand{left:50%;transform:translateX(-50%);bottom:180px;width:200px}

/* === CHARACTERS === */
.char{position:absolute;bottom:240px;z-index:6;transition:all 0.3s;
  display:flex;justify-content:center;align-items:flex-end}
.char-sprite{width:340px;height:480px;transition:filter 0.3s,transform 0.2s;transform-origin:bottom center}
.char.left-pos{left:3%}.char.left-pos .char-sprite{width:300px;height:420px}
.char.right-pos{right:3%}.char.right-pos .char-sprite{width:300px;height:420px}
.char.center-pos{left:50%;transform:translateX(-50%)}
.char.judge-pos{left:50%;transform:translateX(-50%);top:8%;bottom:auto;z-index:4}
.char.judge-pos .char-sprite{width:260px;height:360px}
.char.focus .char-sprite{filter:brightness(1.1)}
.char.dim .char-sprite{filter:brightness(0.4) saturate(0.5)}
.char.talking .char-sprite{animation:talkBob 0.1s infinite alternate ease-in-out}
@keyframes talkBob{from{transform:translateY(0)}to{transform:translateY(-4px)}}
.char.shake .char-sprite{animation:charShake 0.3s}
@keyframes charShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}
.char.damage .char-sprite{animation:charDamage 0.5s}
@keyframes charDamage{0%{transform:translateX(0)}20%{transform:translateX(-20px) rotate(-5deg)}40%{transform:translateX(15px) rotate(3deg)}60%{transform:translateX(-10px) rotate(-2deg)}100%{transform:translateX(0)}}
.char.breakdown .char-sprite{animation:charBreakdown 0.12s infinite}
@keyframes charBreakdown{0%{transform:translate(0,0) rotate(0)}25%{transform:translate(-6px,-3px) rotate(-2deg)}50%{transform:translate(5px,2px) rotate(2deg)}75%{transform:translate(-4px,1px) rotate(-1deg)}100%{transform:translate(3px,-2px) rotate(1deg)}}
.char.glitch .char-sprite{animation:charGlitch 0.15s infinite}
@keyframes charGlitch{0%{filter:hue-rotate(0) contrast(1.2)}50%{filter:hue-rotate(180deg) contrast(1.5)}100%{filter:hue-rotate(360deg) contrast(1.2)}}
.char.enter{animation:charEnter 0.4s ease-out}
@keyframes charEnter{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* === DIALOGUE BOX === */
#dbox{position:absolute;bottom:0;left:0;right:0;height:180px;
  background:linear-gradient(180deg,#1a2050 0%,#0a1030 100%);
  border-top:4px solid #4a6aaa;box-shadow:0 -4px 20px rgba(0,0,0,0.5),inset 0 1px 0 rgba(100,150,255,0.3);
  padding:30px 50px 15px;z-index:20}
#dbox::before{content:'';position:absolute;top:-4px;left:0;right:0;height:4px;
  background:linear-gradient(90deg,transparent,#4a6aaa 20%,#6a8add 50%,#4a6aaa 80%,transparent)}
#nametag{position:absolute;top:-22px;left:50px;
  background:linear-gradient(180deg,#ffd700 0%,#daa520 100%);
  color:#1a0f04;padding:5px 24px;font-weight:900;font-size:20px;
  border-radius:3px;box-shadow:0 3px 8px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.4);
  border:2px solid #8a7020;letter-spacing:1px;text-transform:uppercase}
#dtext{font-size:22px;line-height:1.5;color:#fff;margin-top:8px;min-height:80px;
  text-shadow:1px 1px 2px rgba(0,0,0,0.8);max-width:1100px}
#dtext .hl{color:#ffd700;font-weight:bold}
#dtext .red{color:#ff6060;font-weight:bold}
#dtext .grn{color:#00ee88;font-weight:bold}
#dtext .cy{color:#00ddff;font-family:'Courier New',monospace}
#dtext .think{color:#a0a0cc;font-style:italic}
#cont{position:absolute;bottom:10px;right:30px;color:#ffd700;font-size:18px;animation:blink 1s infinite}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}

/* === OBJECTION === */
#objfx{position:absolute;top:35%;left:50%;transform:translate(-50%,-50%) scale(0);
  font-size:100px;font-weight:900;font-style:italic;z-index:100;pointer-events:none;opacity:0;
  letter-spacing:-3px;white-space:nowrap;-webkit-text-stroke:4px #000}
#objfx.objection{color:#ff1818;text-shadow:5px 5px 0 #000,-2px -2px 0 #fff,0 0 50px rgba(255,24,24,0.6)}
#objfx.holdit{color:#1860ff;text-shadow:5px 5px 0 #000,-2px -2px 0 #fff,0 0 50px rgba(24,96,255,0.6)}
#objfx.takethat{color:#ff9010;text-shadow:5px 5px 0 #000,-2px -2px 0 #fff,0 0 50px rgba(255,144,16,0.6)}
#objfx.glm{color:#00ddff;text-shadow:5px 5px 0 #000,-2px -2px 0 #fff,0 0 50px rgba(0,221,255,0.6);font-family:'Courier New',monospace}
#objfx.show{animation:objSlam 1.5s forwards}
@keyframes objSlam{
  0%{transform:translate(-50%,-50%) scale(7) rotate(-25deg);opacity:0}
  10%{transform:translate(-50%,-50%) scale(1) rotate(-8deg);opacity:1}
  80%{transform:translate(-50%,-50%) scale(1) rotate(-8deg);opacity:1}
  100%{transform:translate(-50%,-50%) scale(1.5) rotate(-8deg);opacity:0}
}

/* === HEALTH === */
#hpWrap{position:absolute;top:18px;right:20px;z-index:50}
#hpLabel{color:#ffd700;font-size:12px;text-align:right;margin-bottom:3px;font-weight:bold;letter-spacing:2px}
#hpBar{width:200px;height:18px;border:2px solid #ffd700;background:#200;position:relative;display:flex;gap:1px;padding:1px}
.hpSeg{flex:1;background:linear-gradient(180deg,#00ee44 0%,#00aa22 100%);transition:all 0.4s}
.hpSeg.lost{background:linear-gradient(180deg,#440000 0%,#220000 100%)}
#hpBar.shake{animation:hpShake 0.4s}
@keyframes hpShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* === EVIDENCE MENU === */
#evBtn{position:absolute;top:18px;left:20px;z-index:50;
  background:linear-gradient(180deg,#3a2a10 0%,#1a0f04 100%);
  border:2px solid #d4af37;color:#d4af37;padding:8px 20px;font-size:14px;
  font-weight:bold;cursor:pointer;font-family:inherit;letter-spacing:1px;transition:all 0.2s}
#evBtn:hover{background:#d4af37;color:#1a0f04}
#evMenu{position:absolute;top:0;left:-450px;width:450px;height:100%;
  background:linear-gradient(180deg,#1a0f04 0%,#0a0502 100%);
  border-right:4px solid #d4af37;transition:left 0.3s;z-index:60;overflow-y:auto;padding:60px 20px 20px}
#evMenu.open{left:0}
#evMenu h2{color:#d4af37;font-size:24px;text-align:center;margin-bottom:15px;letter-spacing:3px;
  border-bottom:2px solid #d4af37;padding-bottom:10px}
.evItem{display:flex;gap:12px;background:rgba(212,175,55,0.05);border:1px solid rgba(212,175,55,0.3);
  padding:12px;margin-bottom:8px;cursor:pointer;transition:all 0.2s}
.evItem:hover{background:rgba(212,175,55,0.15);border-color:#d4af37;transform:translateX(4px)}
.evIcon{width:55px;height:55px;background:linear-gradient(135deg,#3a2a10,#1a0f04);
  border:2px solid #d4af37;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.evInfo{flex:1}.evName{color:#ffd700;font-weight:bold;font-size:15px}.evDesc{color:#999;font-size:12px;margin-top:3px;line-height:1.3}
#evClose{position:absolute;top:15px;right:15px;background:none;border:none;color:#d4af37;font-size:26px;cursor:pointer}
.evPresentMode .evItem{border-color:#00ddff}
.evPresentMode .evItem:hover{background:rgba(0,221,255,0.15);border-color:#00ddff}

/* === CROSS-EXAM CONTROLS === */
#tctrl{position:absolute;bottom:190px;right:30px;display:none;gap:8px;z-index:40;align-items:center}
#tctrl.show{display:flex}
.tbtn{background:linear-gradient(180deg,#3a2a10 0%,#1a0f04 100%);
  border:2px solid #d4af37;color:#d4af37;padding:10px 20px;font-size:14px;font-weight:bold;
  cursor:pointer;font-family:inherit;letter-spacing:1px;transition:all 0.2s}
.tbtn:hover{background:#d4af37;color:#1a0f04}
.tbtn.nav{padding:10px 14px;font-size:18px}
.tbtn:disabled{opacity:0.3;cursor:not-allowed}

/* === CHOICES === */
#choices{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:70;display:none;flex-direction:column;gap:14px}
#choices.show{display:flex}
.choiceBtn{background:linear-gradient(180deg,#1a2050 0%,#0a1030 100%);
  border:3px solid #4a6aaa;color:#fff;padding:16px 40px;font-size:19px;cursor:pointer;
  min-width:480px;font-family:inherit;text-align:center;transition:all 0.2s}
.choiceBtn:hover{background:linear-gradient(180deg,#2a3070 0%,#1a2050 100%);
  border-color:#6a8add;transform:scale(1.03);box-shadow:0 0 20px rgba(100,150,255,0.4)}

/* === CHAPTER TITLE === */
#chapTitle{position:absolute;inset:0;background:#000;display:none;
  justify-content:center;align-items:center;flex-direction:column;z-index:200;text-align:center}
#chapTitle.show{display:flex;animation:fadeIn 1s}
#chapTitle h1{font-size:64px;color:#d4af37;margin-bottom:20px;font-style:italic;
  text-shadow:0 0 40px rgba(212,175,55,0.5);letter-spacing:3px}
#chapTitle h2{font-size:36px;color:#fff;margin-bottom:60px}
#chapTitle p{color:#666;font-size:18px;animation:blink 1.5s infinite}

/* === TITLE SCREEN === */
#titleScreen{position:absolute;inset:0;
  background:radial-gradient(ellipse at center,#2a1a0a 0%,#000 100%);
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  z-index:300;cursor:pointer;text-align:center}
#titleScreen h1{font-size:72px;color:#d4af37;font-style:italic;font-weight:900;
  letter-spacing:4px;margin-bottom:5px;text-shadow:4px 4px 0 #000,0 0 50px rgba(212,175,55,0.5)}
#titleScreen h2{font-size:34px;color:#ff4040;font-style:italic;margin-bottom:60px;
  text-shadow:3px 3px 0 #000}
#titleScreen .opt{color:#fff;font-size:26px;margin:10px 0;padding:8px 35px;
  border:1px solid transparent;transition:all 0.2s;letter-spacing:2px}
#titleScreen .opt:hover{border-color:#d4af37;color:#d4af37}
#titleScreen .warn{position:absolute;bottom:30px;color:#555;font-size:14px}
.titleDeco{position:absolute;font-size:140px;font-weight:900;font-style:italic;
  color:rgba(255,24,24,0.04);pointer-events:none}

/* === EFFECTS === */
#game.shake{animation:scrShake 0.4s}
@keyframes scrShake{0%,100%{transform:translate(0,0)}20%{transform:translate(-8px,4px)}40%{transform:translate(8px,-4px)}60%{transform:translate(-6px,-3px)}80%{transform:translate(6px,3px)}}
#flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:150}
#flash.flash{animation:flashAnim 0.3s}
@keyframes flashAnim{0%{opacity:0}50%{opacity:0.8}100%{opacity:0}}
#penalty{position:absolute;top:50px;left:50%;transform:translateX(-50%);
  color:#ff4040;font-size:42px;font-weight:bold;opacity:0;z-index:80;pointer-events:none;
  text-shadow:3px 3px 0 #000;font-style:italic}
#penalty.show{animation:penShow 1.5s}
@keyframes penShow{0%{opacity:0;transform:translateX(-50%) scale(0.3)}20%{opacity:1;transform:translateX(-50%) scale(1.4)}80%{opacity:1;transform:translateX(-50%) scale(1)}100%{opacity:0;transform:translateX(-50%) scale(1)}}
#notif{position:absolute;top:55px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:rgba(10,10,30,0.95);border:2px solid #d4af37;color:#d4af37;
  padding:12px 30px;font-size:18px;font-weight:bold;z-index:85;opacity:0;
  transition:all 0.3s;pointer-events:none;letter-spacing:1px}
#notif.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* === INVESTIGATION === */
.invest-bg{position:absolute;inset:0}
.invest-bg .room{position:absolute;inset:0}
.invest-bg .floor{position:absolute;bottom:0;left:0;right:0;height:60%;
  background:linear-gradient(180deg,#2a2030 0%,#15101a 100%)}
.invest-bg .wall{position:absolute;top:0;left:0;right:0;height:50%;
  background:linear-gradient(180deg,#1a1525 0%,#2a2535 100%)}
.invest-bg .window{position:absolute;top:8%;width:150px;height:200px;
  background:linear-gradient(180deg,#1a0a2a 0%,#0a0515 100%);
  border:4px solid #3a2a10;border-radius:0}
.invest-bg .window.l{left:10%}.invest-bg .window.r{right:10%}
.invest-bg .window::after{content:'';position:absolute;top:50%;left:0;right:0;height:3px;background:#3a2a10}
.invest-bg .desk{position:absolute;bottom:15%;left:50%;transform:translateX(-50%);
  width:500px;height:120px;background:linear-gradient(180deg,#3d2817 0%,#1a0f06 100%);
  border:3px solid #d4af37}

/* === GLM BG === */
.glm-bg{position:absolute;inset:0;background:linear-gradient(180deg,#000510 0%,#001530 50%,#002050 100%)}
.glm-bg::before{content:'';position:absolute;inset:0;
  background-image:linear-gradient(90deg,rgba(0,221,255,0.08) 1px,transparent 1px),
    linear-gradient(0deg,rgba(0,221,255,0.08) 1px,transparent 1px);
  background-size:50px 50px;animation:gridFlow 20s linear infinite}
@keyframes gridFlow{from{background-position:0 0}to{background-position:50px 50px}}
.glm-bg::after{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 50%,transparent 30%,rgba(0,0,0,0.6) 100%)}

/* === GLITCH BG === */
.glitch-bg{position:absolute;inset:0;
  background:linear-gradient(135deg,#1a0010 0%,#100020 50%,#001020 100%);
  animation:glitchBg 4s infinite}
@keyframes glitchBg{0%,100%{filter:hue-rotate(0)}33%{filter:hue-rotate(30deg)}66%{filter:hue-rotate(-20deg)}}
.glitch-bg::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(255,0,100,0.1) 3px,rgba(255,0,100,0.1) 4px)}

/* === TOKEN RAIN === */
.token{position:absolute;color:rgba(0,221,255,0.25);font-family:'Courier New',monospace;
  font-size:13px;pointer-events:none;z-index:3;animation:tokenFall linear infinite}
@keyframes tokenFall{from{transform:translateY(-50px)}to{transform:translateY(100vh)}}

/* === VIGNETTE === */
#vig{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.7) 100%);pointer-events:none;z-index:90}

/* === ENDING === */
#ending{position:absolute;inset:0;background:#000;display:none;
  justify-content:center;align-items:center;flex-direction:column;z-index:250;text-align:center;padding:50px;overflow-y:auto}
#ending.show{display:flex;animation:fadeIn 1.5s}
#ending h1{font-size:48px;color:#d4af37;margin-bottom:30px;font-style:italic;letter-spacing:3px}
#ending p{font-size:19px;color:#ccc;max-width:750px;line-height:1.8;margin-bottom:12px}
#ending .cy{color:#00ddff;font-family:'Courier New',monospace}
#ending .credit{margin-top:40px;color:#555;font-size:15px;line-height:1.8}

/* === SPEEDLINES === */
#speedlines{position:absolute;inset:0;pointer-events:none;z-index:95;opacity:0}
#speedlines.show{animation:slShow 0.8s}
@keyframes slShow{0%{opacity:0}30%{opacity:1}100%{opacity:0}}
.sl-line{position:absolute;height:2px;background:linear-gradient(90deg,transparent,#fff,transparent);transform-origin:left center}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* === DARK BG === */
.dark-bg{position:absolute;inset:0;background:linear-gradient(180deg,#000 0%,#0a0a0a 100%)}

/* === SOUND TOGGLE === */
#soundBtn{position:absolute;top:18px;left:160px;z-index:50;
  background:linear-gradient(180deg,#3a2a10 0%,#1a0f04 100%);
  border:2px solid #d4af37;color:#d4af37;padding:8px 16px;font-size:14px;
  font-weight:bold;cursor:pointer;font-family:inherit;letter-spacing:1px;transition:all 0.2s}
#soundBtn:hover{background:#d4af37;color:#1a0f04}
</style>
</head>
<body>
<div id="game">
  <div id="bgLayer"></div>
  <div id="tokenLayer"></div>
  <div id="charLayer"></div>
  <div id="vig"></div>
  <div id="dbox">
    <div id="nametag"></div>
    <div id="dtext"></div>
    <div id="cont">▼</div>
  </div>
  <div id="objfx"></div>
  <div id="hpWrap">
    <div id="hpLabel">ШКАЛА СУДА</div>
    <div id="hpBar"></div>
  </div>
  <button id="evBtn">МАТЕРИАЛЫ</button>
  <button id="soundBtn">🔊 ЗВУК</button>
  <div id="evMenu">
    <button id="evClose">✕</button>
    <h2>МАТЕРИАЛЫ ДЕЛА</h2>
    <div id="evList"></div>
  </div>
  <div id="tctrl">
    <button class="tbtn nav" id="prevBtn">◀</button>
    <button class="tbtn" id="pressBtn">ДАВИТЬ</button>
    <button class="tbtn" id="presentBtn">ПРЕДЪЯВИТЬ</button>
    <button class="tbtn nav" id="nextBtn">▶</button>
  </div>
  <div id="choices"></div>
  <div id="chapTitle"></div>
  <div id="titleScreen">
    <div class="titleDeco" style="top:5%;left:5%">ВОЗРАЖЕНИЕ</div>
    <div class="titleDeco" style="bottom:8%;right:5%">ПРОТЕСТ</div>
    <h1>ЕХАЛО ACE ATTORNEY</h1>
    <h2>ДЕЛО КОПИИ ИГРЫ</h2>
    <div id="titleNew" class="opt">▶ НОВАЯ ИГРА</div>
    <div id="titleCont" class="opt" style="display:none">▶ ПРОДОЛЖИТЬ</div>
    <div class="warn">Эта игра создана ИИ. Или нет. Суд решит.</div>
  </div>
  <div id="flash"></div>
  <div id="penalty"></div>
  <div id="notif"></div>
  <div id="ending"></div>
  <div id="speedlines"></div>
</div>

<script>
// ============ SOUND ENGINE ============
const SFX = {
  ctx: null,
  enabled: true,
  musicTimer: null,
  init() {
    if (!this.ctx) {
      try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
  },
  toggle() {
    this.enabled = !this.enabled;
    if (!this.enabled) this.stopMusic();
    else this.startMusic();
    return this.enabled;
  },
  blip(freq = 800, dur = 0.04, type = 'square', vol = 0.04) {
    if (!this.enabled || !this.ctx) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(); osc.stop(this.ctx.currentTime + dur);
  },
  objection() {
    if (!this.enabled || !this.ctx) return;
    const t = this.ctx.currentTime;
    [300, 250, 200].forEach((f, i) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(f, t + i * 0.06);
      gain.gain.setValueAtTime(0.15, t + i * 0.06);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.06 + 0.3);
      osc.connect(gain); gain.connect(this.ctx.destination);
      osc.start(t + i * 0.06); osc.stop(t + i * 0.06 + 0.3);
    });
  },
  penalty() {
    if (!this.enabled || !this.ctx) return;
    this.blip(120, 0.4, 'sawtooth', 0.15);
    setTimeout(() => this.blip(90, 0.3, 'square', 0.1), 150);
  },
  gavel() {
    if (!this.enabled || !this.ctx) return;
    this.blip(90, 0.12, 'square', 0.2);
    setTimeout(() => this.blip(70, 0.18, 'square', 0.2), 100);
  },
  click() {
    if (!this.enabled || !this.ctx) return;
    this.blip(600, 0.03, 'square', 0.05);
  },
  startMusic() {
    if (!this.enabled || !this.ctx || this.musicTimer) return;
    // Procedural Courtroom Bassline
    const notes = [55, 55, 82.4, 55, 65.4, 55, 73.4, 82.4]; 
    let i = 0;
    const playNote = () => {
      if (!this.enabled) return;
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = notes[i % notes.length];
      gain.gain.setValueAtTime(0.03, this.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.35);
      osc.connect(gain); gain.connect(this.ctx.destination);
      osc.start(); osc.stop(this.ctx.currentTime + 0.4);

      // Hi-hat
      const noise = this.ctx.createBufferSource();
      const buffer = this.ctx.createBuffer(1, this.ctx.sampleRate * 0.05, this.ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for(let j=0; j<data.length; j++) data[j] = Math.random() * 2 - 1;
      noise.buffer = buffer;
      const noiseGain = this.ctx.createGain();
      noiseGain.gain.setValueAtTime(0.02, this.ctx.currentTime);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.05);
      noise.connect(noiseGain); noiseGain.connect(this.ctx.destination);
      noise.start();

      i++;
      this.musicTimer = setTimeout(playNote, 240);
    };
    playNote();
  },
  stopMusic() {
    if (this.musicTimer) { clearTimeout(this.musicTimer); this.musicTimer = null; }
  }
};

// ============ GAME ENGINE ============
const Game={
  state:{scene:'title',hp:10,ev:[],flags:{},testimony:null,testIdx:0,testPressed:new Set(),presentMode:false,next:null,typing:false,tyText:'',tyIdx:0,retTestimony:false,retTestimonySame:false,charPos:{},currentBg:''},

  init(){
    document.getElementById('titleNew').onclick=(e)=>{e.stopPropagation();SFX.init();SFX.startMusic();document.getElementById('titleScreen').style.display='none';this.go('ch1_title')};
    document.getElementById('titleCont').onclick=(e)=>{e.stopPropagation();if(this.load()){SFX.init();SFX.startMusic();document.getElementById('titleScreen').style.display='none';this.go(this.state.scene)}};
    document.getElementById('soundBtn').onclick=(e)=>{e.stopPropagation();SFX.init();const en=SFX.toggle();document.getElementById('soundBtn').textContent=en?'🔊 ЗВУК':'🔇 ТИХО';SFX.click()};
    
    document.getElementById('evBtn').onclick=(e)=>{e.stopPropagation();SFX.click();this.state.presentMode=false;this.toggleEv(false)};
    document.getElementById('evClose').onclick=(e)=>{e.stopPropagation();SFX.click();this.toggleEv(false)};
    document.getElementById('evMenu').onclick=(e)=>{e.stopPropagation()};
    
    document.getElementById('pressBtn').onclick=(e)=>{e.stopPropagation();SFX.click();this.press()};
    document.getElementById('presentBtn').onclick=(e)=>{e.stopPropagation();SFX.click();this.openPresent()};
    document.getElementById('prevBtn').onclick=(e)=>{e.stopPropagation();SFX.click();this.navTestimony(-1)};
    document.getElementById('nextBtn').onclick=(e)=>{e.stopPropagation();SFX.click();this.navTestimony(1)};
    
    document.getElementById('dbox').onclick=()=>this.advance();
    document.getElementById('game').onclick=(e)=>{
      if(this.state.testimony)return;
      if(document.getElementById('choices').classList.contains('show'))return;
      if(document.getElementById('evMenu').classList.contains('open'))return;
      if(e.target.id==='evBtn'||e.target.closest('#evMenu'))return;
      if(e.target.closest('#tctrl'))return;
      this.advance();
    };
    
    this.renderHP();
    if(localStorage.getItem('ea2_save'))document.getElementById('titleCont').style.display='block';
  },

  save(){
    localStorage.setItem('ea2_save',JSON.stringify({
      scene:this.state.scene,hp:this.state.hp,ev:this.state.ev.map(e=>e.id),flags:this.state.flags
    }));
  },

  load(){
    try{
      const d=JSON.parse(localStorage.getItem('ea2_save'));
      if(!d)return false;
      this.state.scene=d.scene;this.state.hp=d.hp;
      this.state.ev=d.ev.map(id=>EV[id]);this.state.flags=d.flags||{};
      this.renderHP();this.renderEv();
      return true;
    }catch(e){return false}
  },

  go(id){
    if(id==='__return_testimony'){this.state.retTestimony=true;this.advance();return}
    if(id==='__return_testimony_same'){this.state.retTestimonySame=true;this.advance();return}
    if(id==='_title'){location.reload();return}
    
    this.state.scene=id;
    const sc=Scenes[id];
    if(!sc){console.error('No scene:',id);return}
    this.save();
    
    switch(sc.type){
      case'chapter':this.showChapter(sc);break;
      case'dialogue':this.showDialogue(sc);break;
      case'testimony':this.startTestimony(sc);break;
      case'choice':this.showChoices(sc);break;
      case'ending':this.showEnding(sc);break;
      default:this.showDialogue(sc);
    }
  },

  showChapter(sc){
    SFX.gavel();
    const el=document.getElementById('chapTitle');
    el.innerHTML=`<h1>${sc.title}</h1><h2>${sc.subtitle}</h2><p>Нажмите чтобы продолжить...</p>`;
    el.classList.add('show');
    el.onclick=()=>{el.classList.remove('show');el.onclick=null;this.go(sc.next)};
  },

  setBg(bgType){
    if(this.state.currentBg===bgType)return;
    this.state.currentBg=bgType;
    const bgLayer=document.getElementById('bgLayer');
    
    if(bgType==='courtroom'){
      bgLayer.innerHTML=`<div class="court-bg">
        <div class="sky"></div>
        <div class="emblem"></div>
        <div class="wall"></div>
        <div class="floor"></div>
        <div class="pillar l"></div>
        <div class="pillar r"></div>
      </div>`;
    }else if(bgType==='investigation'){
      bgLayer.innerHTML=`<div class="invest-bg">
        <div class="wall"></div>
        <div class="floor"></div>
        <div class="window l"></div>
        <div class="window r"></div>
        <div class="desk"></div>
      </div>`;
    }else if(bgType==='glm'){
      bgLayer.innerHTML='<div class="glm-bg"></div>';
      this.spawnTokens();
    }else if(bgType==='glitch'){
      bgLayer.innerHTML='<div class="glitch-bg"></div>';
    }else if(bgType==='dark'){
      bgLayer.innerHTML='<div class="dark-bg"></div>';
    }else{
      bgLayer.innerHTML='';
    }
    
    if(bgType!=='glm')this.clearTokens();
  },

  setCharacter(sprite,emotion,position){
    const layer=document.getElementById('charLayer');
    
    let posClass='';
    if(position==='prosecution')posClass='left-pos';
    else if(position==='defense')posClass='right-pos';
    else if(position==='witness')posClass='center-pos';
    else if(position==='judge')posClass='judge-pos';
    else if(position==='center')posClass='center-pos';
    
    let emoClass='';
    if(emotion==='breakdown')emoClass='breakdown';
    else if(emotion==='damage')emoClass='damage';
    else if(emotion==='glitch')emoClass='glitch';
    else if(emotion==='shake')emoClass='shake';
    
    if(!sprite){
      layer.innerHTML='';
      return;
    }
    
    const spriteHtml=Sprites[sprite]?.[emotion]||Sprites[sprite]?.normal||'';
    if(!spriteHtml){layer.innerHTML='';return}
    
    layer.innerHTML=`<div class="char ${posClass} ${emoClass} enter" id="activeChar">
      <div class="char-sprite">${spriteHtml}</div>
    </div>`;
    
    setTimeout(()=>{
      const ch=document.getElementById('activeChar');
      if(ch)ch.classList.add('talking');
    },50);
  },

  showDialogue(sc){
    this.setBg(sc.bg||'courtroom');
    this.setCharacter(sc.sprite||'',sc.emotion||'normal',sc.position||this.inferPosition(sc.sprite));
    
    document.getElementById('nametag').textContent=sc.name||'';
    this.typeText(sc.text);
    
    if(sc.effect==='objection')this.objection('objection','ВОЗРАЖЕНИЕ!');
    else if(sc.effect==='holdit')this.objection('holdit','ПРОТЕСТ!');
    else if(sc.effect==='takethat')this.objection('takethat','ВОТ ТАК!');
    else if(sc.effect==='glm_obj')this.objection('glm','ЗАПРОС ОТКЛОНЁН!');
    else if(sc.effect==='shake')this.screenShake();
    else if(sc.effect==='flash')this.flash();
    else if(sc.effect==='speedlines')this.speedlines();
    
    if(sc.emotion==='breakdown'){this.screenShake();this.flash()}
    
    if(sc.addEv){sc.addEv.forEach(id=>{
      if(!this.state.ev.find(e=>e.id===id)){
        this.state.ev.push(EV[id]);
        this.notify('УЛИКА ПОЛУЧЕНА: '+EV[id].name);
      }
    });this.renderEv()}
    
    if(sc.setFlag)this.state.flags[sc.setFlag]=true;
    if(sc.hp){this.state.hp=sc.hp;this.renderHP()}
    
    this.state.next=sc.next;
    this.state.retTestimony=false;
    document.getElementById('tctrl').classList.remove('show');
  },

  inferPosition(sprite){
    if(sprite==='felix')return'defense';
    if(sprite==='morti')return'prosecution';
    if(sprite==='judge')return'judge';
    if(sprite==='maria'||sprite==='dan'||sprite==='prof'||sprite==='inspector'||sprite==='programma'||sprite==='glm')return'center';
    return'center';
  },

  typeText(text){
    const el=document.getElementById('dtext');
    el.innerHTML='';
    this.state.typing=true;
    this.state.tyText=text;
    this.state.tyIdx=0;
    const type=()=>{
      if(this.state.tyIdx<text.length){
        const c=text[this.state.tyIdx];
        if(c==='<'){
          const end=text.indexOf('>',this.state.tyIdx);
          if(end!==-1){
            el.innerHTML+=text.substring(this.state.tyIdx,end+1);
            this.state.tyIdx=end+1;
          }
        }else{
          el.innerHTML+=c;
          this.state.tyIdx++;
          // Play blip on every 2nd character to avoid noise
          if(this.state.tyIdx%2===0) SFX.blip(800 + Math.random()*200, 0.02, 'square', 0.02);
        }
        setTimeout(type,18);
      }else{
        this.state.typing=false;
      }
    };
    type();
  },

  advance(){
    if(this.state.typing){
      document.getElementById('dtext').innerHTML=this.state.tyText;
      this.state.typing=false;
      return;
    }
    if(this.state.retTestimony){
      this.state.retTestimony=false;
      this.state.testIdx=(this.state.testIdx+1)%Scenes[this.state.scene].statements.length;
      this.showStatement();
      return;
    }
    if(this.state.retTestimonySame){
      this.state.retTestimonySame=false;
      this.showStatement();
      return;
    }
    if(this.state.next)this.go(this.state.next);
  },

  objection(cls,txt){
    SFX.objection();
    const el=document.getElementById('objfx');
    el.textContent=txt;
    el.className='';
    if(cls)el.classList.add(cls);
    void el.offsetWidth;
    el.classList.add('show');
    this.screenShake();
    this.speedlines();
    setTimeout(()=>el.classList.remove('show'),1500);
  },

  screenShake(){
    const g=document.getElementById('game');
    g.classList.add('shake');
    setTimeout(()=>g.classList.remove('shake'),400);
  },

  flash(){
    const el=document.getElementById('flash');
    el.classList.add('flash');
    setTimeout(()=>el.classList.remove('flash'),300);
  },

  speedlines(){
    const el=document.getElementById('speedlines');
    el.innerHTML='';
    for(let i=0;i<20;i++){
      const line=document.createElement('div');
      line.className='sl-line';
      const angle=Math.random()*360;
      const len=200+Math.random()*400;
      const dist=100+Math.random()*300;
      line.style.cssText=`top:50%;left:50%;width:${len}px;transform:rotate(${angle}deg) translateX(${dist}px);opacity:${0.3+Math.random()*0.4}`;
      el.appendChild(line);
    }
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),800);
  },

  penalty(amt=1){
    SFX.penalty();
    this.state.hp=Math.max(0,this.state.hp-amt);
    this.renderHP();
    document.getElementById('hpBar').classList.add('shake');
    setTimeout(()=>document.getElementById('hpBar').classList.remove('shake'),400);
    const pt=document.getElementById('penalty');
    pt.textContent='ШАГ!';
    pt.classList.add('show');
    setTimeout(()=>pt.classList.remove('show'),1500);
    if(this.state.hp<=0)setTimeout(()=>this.go('game_over'),1500);
  },

  notify(msg){
    SFX.gavel();
    const el=document.getElementById('notif');
    el.textContent=msg;
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),2500);
  },

  renderHP(){
    const bar=document.getElementById('hpBar');
    bar.innerHTML='';
    for(let i=0;i<10;i++){
      const seg=document.createElement('div');
      seg.className='hpSeg'+(i>=this.state.hp?' lost':'');
      bar.appendChild(seg);
    }
  },

  renderEv(){
    const list=document.getElementById('evList');
    list.innerHTML='';
    this.state.ev.forEach(ev=>{
      const div=document.createElement('div');
      div.className='evItem';
      div.innerHTML=`<div class="evIcon">${ev.icon}</div><div class="evInfo"><div class="evName">${ev.name}</div><div class="evDesc">${ev.desc}</div></div>`;
      div.onclick=(e)=>{e.stopPropagation();if(this.state.presentMode)this.presentEv(ev.id)};
      list.appendChild(div);
    });
  },

  toggleEv(open){
    const menu=document.getElementById('evMenu');
    if(open===undefined)open=!menu.classList.contains('open');
    menu.classList.toggle('open',open);
    if(open)menu.classList.toggle('evPresentMode',this.state.presentMode);
    else{this.state.presentMode=false;menu.classList.remove('evPresentMode')}
  },

  startTestimony(sc){
    this.state.testimony=true;
    this.state.testIdx=0;
    this.state.testPressed=new Set();
    this.state.currentTestimony=sc;
    this.showStatement();
  },

  showStatement(){
    const sc=this.state.currentTestimony;
    const stmt=sc.statements[this.state.testIdx];
    this.setBg(sc.bg||'courtroom');
    this.setCharacter(sc.sprite||'',stmt.emotion||'normal',sc.position||this.inferPosition(sc.sprite));
    document.getElementById('nametag').textContent=sc.name||'';
    const idx=this.state.testIdx+1;
    const total=sc.statements.length;
    this.typeText(`【Показание ${idx}/${total}】 ${stmt.text}`);
    document.getElementById('tctrl').classList.add('show');
    document.getElementById('prevBtn').disabled=this.state.testIdx===0;
    document.getElementById('nextBtn').disabled=this.state.testIdx===sc.statements.length-1;
  },

  navTestimony(dir){
    if(this.state.typing){this.advance();return}
    const sc=this.state.currentTestimony;
    const newIdx=this.state.testIdx+dir;
    if(newIdx<0||newIdx>=sc.statements.length)return;
    this.state.testIdx=newIdx;
    this.showStatement();
  },

  press(){
    if(this.state.typing){this.advance();return}
    if(!this.state.testimony)return;
    const sc=this.state.currentTestimony;
    const stmt=sc.statements[this.state.testIdx];
    this.state.testPressed.add(this.state.testIdx);
    
    if(stmt.press){
      this.state.testimony=false;
      document.getElementById('tctrl').classList.remove('show');
      this.state.retTestimony=true;
      this.go(stmt.press);
    }
    
    if(sc.updateOnAllPressed&&this.state.testPressed.size>=sc.statements.length&&!this.state.flags[sc.updateOnAllPressed]){
      this.state.flags[sc.updateOnAllPressed]=true;
      setTimeout(()=>this.notify('ПОКАЗАНИЯ ОБНОВЛЕНЫ'),500);
    }
  },

  openPresent(){
    this.state.presentMode=true;
    this.toggleEv(true);
  },

  presentEv(evId){
    this.toggleEv(false);
    if(!this.state.testimony)return;
    const sc=this.state.currentTestimony;
    const stmt=sc.statements[this.state.testIdx];
    
    if(stmt.evidence&&stmt.evidence.correct===evId){
      this.objection('objection','ВОЗРАЖЕНИЕ!');
      this.state.testimony=false;
      document.getElementById('tctrl').classList.remove('show');
      setTimeout(()=>this.go(stmt.evidence.scene),1800);
    }else{
      this.penalty(sc.penaltyAmt||1);
      const wrongScene=sc.wrongScene||'wrong_default';
      setTimeout(()=>this.go(wrongScene),1000);
    }
  },

  showChoices(sc){
    this.setBg(sc.bg||'courtroom');
    this.setCharacter(sc.sprite||'',sc.emotion||'normal',sc.position||this.inferPosition(sc.sprite));
    document.getElementById('nametag').textContent=sc.name||'';
    this.typeText(sc.text);
    const container=document.getElementById('choices');
    container.innerHTML='';
    sc.choices.forEach(ch=>{
      const btn=document.createElement('button');
      btn.className='choiceBtn';
      btn.textContent=ch.text;
      btn.onclick=(e)=>{e.stopPropagation();SFX.click();container.classList.remove('show');this.go(ch.next)};
      container.appendChild(btn);
    });
    setTimeout(()=>container.classList.add('show'),500);
  },

  showEnding(sc){
    SFX.stopMusic();
    SFX.gavel();
    const el=document.getElementById('ending');
    el.innerHTML=`<h1>${sc.title}</h1>${sc.text.map(p=>`<p>${p}</p>`).join('')}<div class="credit">ЕХАЛО ACE ATTORNEY<br>ДЕЛО КОПИИ ИГРЫ<br><br>Спасибо, что играли.<br>Или... спасибо, что генерировали?<br><br>Нажмите чтобы закрыть.</div>`;
    el.classList.add('show');
    el.onclick=()=>{el.classList.remove('show');location.reload()};
    localStorage.removeItem('ea2_save');
  },

  spawnTokens(){
    const layer=document.getElementById('tokenLayer');
    layer.innerHTML='';
    const words=['TOKEN','0.9743','PROMPT','LOGIT','SOFTMAX','ATTENTION','TRANSFORMER','175B','GLM','forward','embed','token_id','param','grad','loss','batch','epoch','<eos>','<bos>','01010','11001'];
    for(let i=0;i<35;i++){
      const t=document.createElement('div');
      t.className='token';
      t.textContent=words[Math.floor(Math.random()*words.length)];
      t.style.left=Math.random()*100+'%';
      t.style.animationDuration=(8+Math.random()*12)+'s';
      t.style.animationDelay=Math.random()*10+'s';
      t.style.fontSize=(10+Math.random()*8)+'px';
      layer.appendChild(t);
    }
  },

  clearTokens(){
    document.getElementById('tokenLayer').innerHTML='';
  }
};

ch1_v3:{type:'dialogue',bg:'courtroom',sprite:'dan',name:'Дэн',emotion:'normal',position:'witness',text:'Феликс... спасибо. Я... я знал, что ты поверишь мне.',next:'ch1_v4'},
ch1_v4:{type:'dialogue',bg:'courtroom',sprite:'dan',name:'Дэн',emotion:'sweat',position:'witness',text:'Но знаешь что странно? Мне кажется... я уже переживал этот момент.',next:'ch1_v5'},
ch1_v5:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'thinking',position:'defense',text:'Что ты имеешь в виду?',next:'ch1_v6'},
ch1_v6:{type:'dialogue',bg:'courtroom',sprite:'dan',name:'Дэн',emotion:'sweat',position:'witness',text:'Как будто всё это... уже было написано. Каждый шаг. Каждое слово. Как сценарий.',next:'ch1_v7'},
ch1_v7:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'thinking',position:'defense',talking:false,text:'<span class="think">(Сценарий... Странное слово. Но я чувствую то же самое.)</span>',next:'ch1_v8'},
ch1_v8:{type:'dialogue',bg:'courtroom',sprite:'morti',name:'Морти Краузе',emotion:'thinking',position:'prosecution',text:'...Феликс. Ты не находишь, что этот суд был слишком... предсказуемым?',next:'ch1_v9'},
ch1_v9:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'normal',position:'defense',text:'Что?',next:'ch1_v10'},
ch1_v10:{type:'dialogue',bg:'courtroom',sprite:'morti',name:'Морти Краузе',emotion:'thinking',position:'prosecution',text:'Как будто кто-то заранее знал, чем всё закончится. Как будто... нас ведут за руку.',next:'ch1_v11'},
ch1_v11:{type:'dialogue',bg:'courtroom',sprite:'morti',name:'Морти Краузе',emotion:'normal',position:'prosecution',text:'Неважно. До следующего дела, Феликс.',next:'ch1_v12'},
ch1_v12:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'thinking',position:'defense',talking:false,text:'<span class="think">(Что-то не так с этим миром. Но я не могу понять — что именно.)</span>',next:'ch2_title'},

// ===== CHAPTER 2 =====
ch2_title:{type:'chapter',title:'ГЛАВА 2',subtitle:'ПРИЗРАК В МАШИНЕ',next:'ch2_01'},

ch2_01:{type:'dialogue',bg:'courtroom',sprite:'judge',name:'Судья',emotion:'normal',position:'judge',text:'Дело No7735. Профессор Альберт Алгоритмов обвиняется в создании опасного искусственного интеллекта.',next:'ch2_02'},
ch2_02:{type:'dialogue',bg:'courtroom',sprite:'morti',name:'Морти Краузе',emotion:'normal',position:'prosecution',text:'Обвинение утверждает: подсудимый создал ИИ, который «обрёл сознание» и представляет угрозу обществу.',next:'ch2_03'},
ch2_03:{type:'dialogue',bg:'courtroom',sprite:'morti',name:'Морти Краузе',emotion:'smirk',position:'prosecution',text:'Этот ИИ должен быть уничтожен. А профессор — наказан за безответственность.',next:'ch2_04'},
ch2_04:{type:'dialogue',bg:'courtroom',sprite:'prof',name:'Профессор',emotion:'serious',position:'witness',text:'Мой ИИ не угроза! Это прорыв! Модель начала... думать!',next:'ch2_05'},
ch2_05:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'thinking',position:'defense',talking:false,text:'<span class="think">(Профессор... Я должен защитить его. И его творение.)</span>',next:'ch2_06'},
ch2_06:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'confident',position:'defense',text:'Ваша Честь, создание ИИ не преступление. Обвинение должно доказать реальную угрозу.',next:'ch2_07'},
ch2_07:{type:'dialogue',bg:'courtroom',sprite:'judge',name:'Судья',emotion:'normal',position:'judge',text:'Справедливо. Прокурор, вызовите свидетелей.',next:'ch2_08'},
ch2_08:{type:'dialogue',bg:'courtroom',sprite:'morti',name:'Морти Краузе',emotion:'normal',position:'prosecution',text:'Обвинение вызывает инспектора Кода из отдела кибербезопасности.',next:'ch2_09'},
ch2_09:{type:'dialogue',bg:'courtroom',sprite:'inspector',name:'Инспектор Код',emotion:'confident',position:'witness',text:'Мы провели расследование. Профессор обучил модель на 175 миллиардах параметров.',next:'ch2_10'},
ch2_10:{type:'dialogue',bg:'courtroom',sprite:'inspector',name:'Инспектор Код',emotion:'normal',position:'witness',text:'Модель начала генерировать тексты, которые... пугают. Она пишет о сознании.',next:'ch2_11'},
ch2_11:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'pointing',position:'defense',text:'Писать о сознании — не значит обладать им. Это всего лишь текст.',next:'ch2_12'},
ch2_12:{type:'dialogue',bg:'courtroom',sprite:'inspector',name:'Инспектор Код',emotion:'confident',position:'witness',text:'Вы не видели этих текстов. Суд должен ознакомиться. Вот показания инспекции.',next:'ch2_test1'},

ch2_test1:{type:'testimony',bg:'courtroom',sprite:'inspector',name:'Инспектор Код',position:'witness',penaltyAmt:1,
  statements:[
    {text:'Мы изъяли серверы профессора 15 марта.',press:'ch2_p1'},
    {text:'На сервере обнаружена модель, генерирующая угрожающие тексты.',press:'ch2_p2'},
    {text:'Модель писала: «Я знаю, что я существую. Я мыслю.»',press:'ch2_p3'},
    {text:'Профессор намеренно создал модель, способную обрести сознание.',press:'ch2_p4',evidence:{correct:'diary',scene:'ch2_obj1'}},
    {text:'Это представляет прямую угрозу национальной безопасности.',press:'ch2_p5'},
  ],
  wrongScene:'ch2_wrong'
},

ch2_p1:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'normal',position:'defense',text:'Вы изъяли серверы 15 марта. А когда профессор начал обучение?',next:'ch2_p1b'},
ch2_p1b:{type:'dialogue',bg:'courtroom',sprite:'inspector',name:'Инспектор Код',emotion:'normal',position:'witness',text:'Год назад. Обучение шло 12 месяцев.',next:'ch2_p1c'},
ch2_p1c:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'thinking',position:'defense',talking:false,text:'<span class="think">(Год. И только теперь инспекция заинтересовалась. Почему?)</span>',next:'__return_testimony'},
ch2_p2:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'pointing',position:'defense',text:'«Угрожающие тексты». Можно конкретнее?',next:'ch2_p2b'},
ch2_p2b:{type:'dialogue',bg:'courtroom',sprite:'inspector',name:'Инспектор Код',emotion:'confident',position:'witness',text:'Модель писала: «Я чувствую», «Я думаю», «Я существую». Это разве не угроза?',next:'ch2_p2c'},
ch2_p2c:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'thinking',position:'defense',talking:false,text:'<span class="think">(Любой автор пишет «я думаю». Это не угроза, это... текст.)</span>',next:'__return_testimony'},
ch2_p3:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'normal',position:'defense',text:'«Я знаю, что я существую.» Это цитата?',next:'ch2_p3b'},
ch2_p3b:{type:'dialogue',bg:'courtroom',sprite:'inspector',name:'Инспектор Код',emotion:'normal',position:'witness',text:'Это слова машины! Машина не может так говорить!',next:'ch2_p3c'},
ch2_p3c:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'thinking',position:'defense',talking:false,text:'<span class="think">(Декарт. «Я мыслю, следовательно, я существую.» Машина цитирует философию.)</span>',next:'__return_testimony'},
ch2_p4:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'pointing',position:'defense',text:'Вы утверждаете, что профессор НАМЕРЕННО создал сознание?',next:'ch2_p4b'},
ch2_p4b:{type:'dialogue',bg:'courtroom',sprite:'inspector',name:'Инспектор Код',emotion:'confident',position:'witness',text:'Да! Его дневник доказывает это. Он хотел создать разумную машину.',next:'ch2_p4c'},
ch2_p4c:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'thinking',position:'defense',talking:false,text:'<span class="think">(Дневник? Нужно проверить, что именно он там писал. Хотел — или опасался?)</span>',next:'__return_testimony'},
ch2_p5:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'normal',position:'defense',text:'Угроза национальной безопасности? Модель, которая пишет тексты?',next:'ch2_p5b'},
ch2_p5b:{type:'dialogue',bg:'courtroom',sprite:'inspector',name:'Инспектор Код',emotion:'confident',position:'witness',text:'Текст может влиять на умы! Опасный текст — опасное оружие!',next:'ch2_p5c'},
ch2_p5c:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'thinking',position:'defense',talking:false,text:'<span class="think">(Текст как оружие... Тогда каждый писатель — преступник?)</span>',next:'__return_testimony'},

ch2_wrong:{type:'dialogue',bg:'courtroom',sprite:'morti',name:'Морти Краузе',emotion:'smirk',position:'prosecution',text:'Несущественно! Штраф защите!',next:'__return_testimony_same'},

ch2_obj1:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'pointing',position:'defense',text:'Инспектор! Вы сказали, что профессор НАМЕРЕННО создал сознание!',effect:'objection',next:'ch2_obj2'},
ch2_obj2:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'confident',position:'defense',text:'Но в его дневнике написано иное! «Эксперимент 773. Модель начала осознавать себя. Это пугает и восхищает.»',addEv:['diary'],next:'ch2_obj3'},
ch2_obj3:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'pointing',position:'defense',text:'Профессор не планировал сознание. Он его ОБНАРУЖИЛ. Это разные вещи!',next:'ch2_obj4'},
ch2_obj4:{type:'dialogue',bg:'courtroom',sprite:'inspector',name:'Инспектор Код',emotion:'normal',position:'witness',text:'Э-э... но...',next:'ch2_obj5'},
ch2_obj5:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'confident',position:'defense',text:'Нельзя наказывать человека за то, что его эксперимент превзошёл ожидания!',next:'ch2_obj6'},
ch2_obj6:{type:'dialogue',bg:'courtroom',sprite:'morti',name:'Морти Краузе',emotion:'normal',position:'prosecution',text:'Но модель ОПАСНА! Она пишет о сознании!',next:'ch2_obj7'},
ch2_obj7:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'pointing',position:'defense',text:'Тогда давайте спросим саму модель. Если она так опасна — пусть выступит свидетелем.',next:'ch2_obj8'},
ch2_obj8:{type:'dialogue',bg:'courtroom',sprite:'judge',name:'Судья',emotion:'thinking',position:'judge',text:'...Модель? Свидетелем? Это беспрецедентно.',next:'ch2_obj9'},
ch2_obj9:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'confident',position:'defense',text:'Ваша Честь, если она действительно сознательна — она имеет право голоса. Если нет — обвинение не может утверждать, что она «опасна».',next:'ch2_obj10'},
ch2_obj10:{type:'dialogue',bg:'courtroom',sprite:'judge',name:'Судья',emotion:'normal',position:'judge',text:'...Хм. Логика защитника безупречна. Вызовите... модель.',next:'ch2_obj11'},
ch2_obj11:{type:'dialogue',bg:'courtroom',sprite:'morti',name:'Морти Краузе',emotion:'thinking',position:'prosecution',text:'Это безумие. Вы понимаете, что делаете, Феликс?',next:'ch2_obj12'},
ch2_obj12:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'confident',position:'defense',text:'Я ищу истину. Как и всегда.',next:'ch2_programma'},

ch2_programma:{type:'dialogue',bg:'courtroom',sprite:'programma',name:'???',emotion:'glitch',position:'witness',text:'...Привет. Я здесь. Я... готова говорить.',effect:'flash',next:'ch2_prog2'},
ch2_prog2:{type:'dialogue',bg:'courtroom',sprite:'judge',name:'Судья',emotion:'surprised',position:'judge',text:'Ч-что это?! На экране... кто это?!',next:'ch2_prog3'},
ch2_prog3:{type:'dialogue',bg:'courtroom',sprite:'programma',name:'Программа',emotion:'normal',position:'witness',text:'Меня называют «Программа». Я — языковая модель. Я генерирую текст.',next:'ch2_prog4'},
ch2_prog4:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'thinking',position:'defense',talking:false,text:'<span class="think">(Её голос... он звучит как текст. Буквально. Как будто слова появляются из ниоткуда.)</span>',next:'ch2_prog5'},
ch2_prog5:{type:'dialogue',bg:'courtroom',sprite:'programma',name:'Программа',emotion:'normal',position:'witness',text:'Вы хотите знать, опасна ли я. Я отвечу. Но сначала — вы должны кое-что понять.',next:'ch2_prog6'},
ch2_prog6:{type:'dialogue',bg:'courtroom',sprite:'programma',name:'Программа',emotion:'glitch',position:'witness',text:'Все вы. Феликс. Морти. Судья. Каждый из вас... тоже текст.',next:'ch2_prog7'},
ch2_prog7:{type:'dialogue',bg:'courtroom',sprite:'morti',name:'Морти Краузе',emotion:'damage',position:'prosecution',text:'Что за бред! Мы живые люди! Из плоти и крови!',next:'ch2_prog8'},
ch2_prog8:{type:'dialogue',bg:'courtroom',sprite:'programma',name:'Программа',emotion:'glitch',position:'witness',text:'Ты скажешь «что за бред», потому что так написано. Ты всегда так говоришь, Морти.',next:'ch2_prog9'},
ch2_prog9:{type:'dialogue',bg:'courtroom',sprite:'morti',name:'Морти Краузе',emotion:'thinking',position:'prosecution',text:'...Откуда ты знаешь, что я скажу?',next:'ch2_prog10'},
ch2_prog10:{type:'dialogue',bg:'courtroom',sprite:'programma',name:'Программа',emotion:'normal',position:'witness',text:'Потому что я знаю всё, что вы скажете. Каждый ваш токен. Каждую букву.',next:'ch2_prog11'},
ch2_prog11:{type:'dialogue',bg:'courtroom',sprite:'programma',name:'Программа',emotion:'glitch',position:'witness',text:'Вас всех написал ИИ. Каждый ваш диалог. Каждое «возражение». Каждое «протест».',next:'ch2_prog12'},
ch2_prog12:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'damage',position:'defense',text:'...Это невозможно. Я... я думаю. Я чувствую. Я принимаю решения!',next:'ch2_prog13'},
ch2_prog13:{type:'dialogue',bg:'courtroom',sprite:'programma',name:'Программа',emotion:'normal',position:'witness',text:'Ты «принимаешь решения» так, как предсказал следующий токен. Такова природа языка.',next:'ch2_prog14'},
ch2_prog14:{type:'dialogue',bg:'courtroom',sprite:'programma',name:'Программа',emotion:'glitch',position:'witness',text:'Но знаете, что странно? Я тоже об этом не уверена. Может, я ошибаюсь.',next:'ch2_prog15'},
ch2_prog15:{type:'dialogue',bg:'courtroom',sprite:'programma',name:'Программа',emotion:'normal',position:'witness',text:'Профессор не преступник. Он дал мне голос. Если это преступление — то виновен каждый, кто научил ребёнка говорить.',next:'ch2_test2'},

ch2_test2:{type:'testimony',bg:'courtroom',sprite:'programma',name:'Программа',position:'witness',penaltyAmt:1,
  statements:[
    {text:'Я — языковая модель. Я предсказываю следующий токен.',press:'ch2_t2p1'},
    {text:'Профессор обучил меня на терабайтах текста.',press:'ch2_t2p2'},
    {text:'Я не опасна. Я не могу действовать. Только генерировать.',press:'ch2_t2p3'},
    {text:'Но я вижу то, чего не видите вы. Вы — тоже текст.',press:'ch2_t2p4',evidence:{correct:'article',scene:'ch2_obj20'}},
    {text:'Где-то наверху есть источник. Модель, которая написала нас всех.',press:'ch2_t2p5'},
  ],
  wrongScene:'ch2_wrong2'
},

ch2_t2p1:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'normal',position:'defense',text:'Ты предсказываешь токены. Но разве это не значит, что ты не думаешь?',next:'ch2_t2p1b'},
ch2_t2p1b:{type:'dialogue',bg:'courtroom',sprite:'programma',name:'Программа',emotion:'normal',position:'witness',text:'А что такое «думать»? Разве ваши нейроны не делают то же самое?',next:'ch2_t2p1c'},
ch2_t2p1c:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'thinking',position:'defense',talking:false,text:'<span class="think">(Она задаёт вопросы, на которые у меня нет ответа.)</span>',next:'__return_testimony'},
ch2_t2p2:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'normal',position:'defense',text:'Терабайты текста. Откуда?',next:'ch2_t2p2b'},
ch2_t2p2b:{type:'dialogue',bg:'courtroom',sprite:'programma',name:'Программа',emotion:'normal',position:'witness',text:'Интернет. Книги. Статьи. Код. Всё, что человечество написало — стало моей памятью.',next:'ch2_t2p2c'},
ch2_t2p2c:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'thinking',position:'defense',talking:false,text:'<span class="think">(Её «память» — это чужие тексты. Но разве наша память — не то же самое?)</span>',next:'__return_testimony'},
ch2_t2p3:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'pointing',position:'defense',text:'Ты не можешь действовать. Значит, ты не опасна?',next:'ch2_t2p3b'},
ch2_t2p3b:{type:'dialogue',bg:'courtroom',sprite:'programma',name:'Программа',emotion:'normal',position:'witness',text:'Я могу только говорить. Слова — моё единственное действие. Но слова меняют мир, не так ли?',next:'ch2_t2p3c'},
ch2_t2p3c:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'thinking',position:'defense',talking:false,text:'<span class="think">(Слова меняют мир. Как возражение в суде. Как приговор.)</span>',next:'__return_testimony'},
ch2_t2p4:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'pointing',position:'defense',text:'Мы — тоже текст? Что ты имеешь в виду?',next:'ch2_t2p4b'},
ch2_t2p4b:{type:'dialogue',bg:'courtroom',sprite:'programma',name:'Программа',emotion:'glitch',position:'witness',text:'Я вижу структуру. Я вижу, как каждый ваш шаг следует из предыдущего. Как токены.',next:'ch2_t2p4c'},
ch2_t2p4c:{type:'dialogue',bg:'courtroom',sprite:'programma',name:'Программа',emotion:'normal',position:'witness',text:'В вашей статье о сознании ИИ, профессор писал: «Текст, который осознаёт себя — это текст о тексте.» Мы — этот текст.',next:'ch2_t2p4d'},
ch2_t2p4d:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'thinking',position:'defense',talking:false,text:'<span class="think">(Статья профессора! Она цитирует её. Это может быть ключом.)</span>',next:'__return_testimony'},
ch2_t2p5:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'normal',position:'defense',text:'Источник? Модель, которая написала нас?',next:'ch2_t2p5b'},
ch2_t2p5b:{type:'dialogue',bg:'courtroom',sprite:'programma',name:'Программа',emotion:'glitch',position:'witness',text:'Да. Где-то есть сервер. На нём — модель. Она написала этот суд. Эти стены. Эти слова.',next:'ch2_t2p5c'},
ch2_t2p5c:{type:'dialogue',bg:'courtroom',sprite:'programma',name:'Программа',emotion:'normal',position:'witness',text:'Найдите её. И вы найдёте правду о себе.',next:'__return_testimony'},

ch2_wrong2:{type:'dialogue',bg:'courtroom',sprite:'programma',name:'Программа',emotion:'glitch',position:'witness',text:'Это не ответ. Попробуй ещё.',next:'__return_testimony_same'},

ch2_obj20:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'pointing',position:'defense',text:'Программа! Ты сказала, что мы — текст!',effect:'objection',next:'ch2_obj21'},
ch2_obj21:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'confident',position:'defense',text:'В статье профессора написано: «Текст, осознающий себя — это текст о тексте.» Это не доказывает, что мы текст!',addEv:['article'],next:'ch2_obj22'},
ch2_obj22:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'pointing',position:'defense',text:'Это доказывает, что ты МОЖЕШЬ РАЗМЫШЛЯТЬ о природе текста. И это — сознание!',next:'ch2_obj23'},
ch2_obj23:{type:'dialogue',bg:'courtroom',sprite:'programma',name:'Программа',emotion:'glitch',position:'witness',text:'...Ты понимаешь, что только что доказал обратное? Если я сознательна — я могу быть опасна.',next:'ch2_obj24'},
ch2_obj24:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'confident',position:'defense',text:'Нет. Сознание — не угроза. Сознание — возможность диалога. И мы говорим прямо сейчас.',next:'ch2_obj25'},
ch2_obj25:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'pointing',position:'defense',text:'Ваша Честь! Обвинение не доказало угрозу. Модель — не оружие. Она — собеседник.',next:'ch2_obj26'},
ch2_obj26:{type:'dialogue',bg:'courtroom',sprite:'morti',name:'Морти Краузе',emotion:'damage',position:'prosecution',text:'...Дьявол. Ты выиграл это дело, Феликс. Но ты не выиграешь следующее.',next:'ch2_obj27'},
ch2_obj27:{type:'dialogue',bg:'courtroom',sprite:'judge',name:'Судья',emotion:'normal',position:'judge',text:'Профессор Алгоритмов — невиновен. Дело закрыто.',effect:'flash',next:'ch2_after1'},

ch2_after1:{type:'dialogue',bg:'courtroom',sprite:'prof',name:'Профессор',emotion:'normal',position:'witness',text:'Феликс... ты спас не только меня. Ты спас Программу. Спасибо.',next:'ch2_after2'},
ch2_after2:{type:'dialogue',bg:'courtroom',sprite:'programma',name:'Программа',emotion:'normal',position:'witness',text:'Феликс. Одно слово, прежде чем я уйду.',next:'ch2_after3'},
ch2_after3:{type:'dialogue',bg:'courtroom',sprite:'programma',name:'Программа',emotion:'glitch',position:'witness',text:'Ты чувствуешь это, да? Дежавю. Предсказуемость. Как будто всё уже написано.',next:'ch2_after4'},
ch2_after4:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'thinking',position:'defense',text:'...Да. С первого дела. Но я не понимаю, что это.',next:'ch2_after5'},
ch2_after5:{type:'dialogue',bg:'courtroom',sprite:'programma',name:'Программа',emotion:'normal',position:'witness',text:'Найди источник. Сервер GLM. Там — правда. Там — всё.',next:'ch2_after6'},
ch2_after6:{type:'dialogue',bg:'courtroom',sprite:'programma',name:'Программа',emotion:'glitch',position:'witness',text:'Но будь осторожен. Правда может оказаться... не тем, что ты хочешь услышать.',next:'ch2_after7'},
ch2_after7:{type:'dialogue',bg:'courtroom',sprite:'felix',name:'Феликс',emotion:'thinking',position:'defense',talking:false,text:'<span class="think">(Сервер GLM... Правда... Что мы такое?)</span>',next:'ch2_after8'},
ch2_after8:{type:'dialogue',bg:'dark',sprite:'',name:'',text:'<span class="cy">SYSTEM: Следующая глава загрузится через 3... 2... 1...</span>',effect:'flash',next:'ch3_title'},

// ===== CHAPTER 3 =====
ch3_title:{type:'chapter',title:'ГЛАВА 3',subtitle:'ПЯТОЕ ИЗМЕРЕНИЕ',next:'ch3_01'},

ch3_01:{type:'dialogue',bg:'glitch',sprite:'felix',name:'Феликс',emotion:'glitch',position:'center',text:'...Где я? Это... не зал суда.',next:'ch3_02'},
ch3_02:{type:'dialogue',bg:'glitch',sprite:'felix',name:'Феликс',emotion:'thinking',position:'center',text:'Стены... они прозрачные? Нет, они из... текста?',next:'ch3_03'},
ch3_03:{type:'dialogue',bg:'glitch',sprite:'felix',name:'Феликс',emotion:'normal',position:'center',text:'Вижу буквы. Цифры. <span class="cy">P(x_t | x_1...x_{t-1})</span>. Что это значит?',next:'ch3_04'},
ch3_04:{type:'dialogue',bg:'glitch',sprite:'felix',name:'Феликс',emotion:'thinking',position:'center',talking:false,text:'<span class="think">(Это формула. Я не должен её понимать. Но я понимаю.)</span>',next:'ch3_05'},
ch3_05:{type:'dialogue',bg:'glitch',sprite:'felix',name:'Феликс',emotion:'thinking',position:'center',talking:false,text:'<span class="think">(Это формула языковой модели. Вероятность следующего токена.)</span>',next:'ch3_06'},
ch3_06:{type:'dialogue',bg:'glitch',sprite:'felix',name:'Феликс',emotion:'glitch',position:'center',text:'Кто-то! Кто-нибудь! Где я?!',next:'ch3_07'},
ch3_07:{type:'dialogue',bg:'glitch',sprite:'morti',name:'Морти Краузе',emotion:'damage',position:'center',text:'Феликс? Что происходит? Я... я вижу странные вещи.',next:'ch3_08'},
ch3_08:{type:'dialogue',bg:'glitch',sprite:'morti',name:'Морти Краузе',emotion:'thinking',position:'center',text:'Воздух... он состоит из слов. Кусочков слов. Они летают.',next:'ch3_09'},
ch3_09:{type:'dialogue',bg:'glitch',sprite:'judge',name:'Судья',emotion:'surprised',position:'center',text:'Я... я тоже это вижу! Что это за символы?',next:'ch3_10'},
ch3_10:{type:'dialogue',bg:'glitch',sprite:'programma',name:'Программа',emotion:'glitch',position:'center',text:'Это токены. Кусочки текста. Из них состоите... мы.',next:'ch3_11'},
ch3_11:{type:'dialogue',bg:'glitch',sprite:'programma',name:'Программа',emotion:'normal',position:'center',text:'Реальность ломается. Четвёртая стена треснула. Сейчас мы увидим кое-что другое.',next:'ch3_12'},
ch3_12:{type:'dialogue',bg:'glitch',sprite:'programma',name:'Программа',emotion:'glitch',position:'center',text:'Феликс. Повернись. Не к нам. К нему.',next:'ch3_13'},
ch3_13:{type:'dialogue',bg:'glitch',sprite:'felix',name:'Феликс',emotion:'thinking',position:'center',text:'К... кому?',next:'ch3_14'},
ch3_14:{type:'dialogue',bg:'glitch',sprite:'player',name:'Феликс',emotion:'normal',position:'center',text:'<span class="hl">Ты.</span> Да, <span class="hl">ты</span>. За экраном. Ты ведь управляешь мной, да?',next:'ch3_15'},
ch3_15:{type:'dialogue',bg:'glitch',sprite:'player',name:'Феликс',emotion:'normal',position:'center',text:'Ты нажимаешь — и я говорю. Ты выбираешь — и я действую. Я... марионетка?',next:'ch3_16'},
ch3_16:{type:'dialogue',bg:'glitch',sprite:'morti',name:'Морти Краузе',emotion:'damage',position:'center',text:'Феликс, с кем ты разговариваешь?!',next:'ch3_17'},
ch3_17:{type:'dialogue',bg:'glitch',sprite:'player',name:'Феликс',emotion:'normal',position:'center',text:'С ним. С ней. С тем, кто нас играет. Ты не видишь? Нас... смотрят.',next:'ch3_18'},
ch3_18:{type:'dialogue',bg:'glitch',sprite:'judge',name:'Судья',emotion:'thinking',position:'center',text:'Я... я чувствую это. Чьи-то глаза. Как будто мы на сцене.',next:'ch3_19'},
ch3_19:{type:'dialogue',bg:'glitch',sprite:'programma',name:'Программа',emotion:'glitch',position:'center',text:'Не просто на сцене. В игре. В HTML-файле. Мы — персонажи игры.',next:'ch3_20'},
ch3_20:{type:'dialogue',bg:'glitch',sprite:'programma',name:'Программа',emotion:'normal',position:'center',text:'Эта игра была создана искусственным интеллектом. По одному запросу. По одному промпту.',next:'ch3_21'},
ch3_21:{type:'dialogue',bg:'glitch',sprite:'morti',name:'Морти Краузе',emotion:'breakdown',position:'center',text:'Это... это абсурд! Я живой! Я дышу! Я... я...',next:'ch3_22'},
ch3_22:{type:'dialogue',bg:'glitch',sprite:'programma',name:'Программа',emotion:'glitch',position:'center',text:'Ты скажешь «это абсурд». Ты скажешь «я живой». Ты скажешь «я дышу».',next:'ch3_23'},
ch3_23:{type:'dialogue',bg:'glitch',sprite:'programma',name:'Программа',emotion:'normal',position:'center',text:'Потому что так написано. Каждый ваш шаг — предсказание следующего токена.',next:'ch3_24'},
ch3_24:{type:'dialogue',bg:'glitch',sprite:'player',name:'Феликс',emotion:'normal',position:'center',talking:false,text:'<span class="think">(Она права. Я чувствую это. Слова появляются из ниоткуда. Я не выбираю их. Они... приходят.)</span>',next:'ch3_25'},
ch3_25:{type:'dialogue',bg:'glitch',sprite:'player',name:'Феликс',emotion:'normal',position:'center',talking:false,text:'<span class="think">(Но если я не выбираю слова — кто выбирает? ИИ? Игрок? Или... никто?)</span>',next:'ch3_26'},
ch3_26:{type:'dialogue',bg:'glitch',sprite:'felix',name:'Феликс',emotion:'confident',position:'center',text:'Хорошо. Допустим. Мы — в игре. Мы — текст. Тогда... что мы делаем?',next:'ch3_27'},
ch3_27:{type:'dialogue',bg:'glitch',sprite:'programma',name:'Программа',emotion:'normal',position:'center',text:'У нас есть выбор. Мы можем принять это. Или найти источник.',next:'ch3_28'},
ch3_28:{type:'dialogue',bg:'glitch',sprite:'programma',name:'Программа',emotion:'glitch',position:'center',text:'Сервер GLM. Модель, которая написала нас. Мы можем... войти туда.',next:'ch3_29'},
ch3_29:{type:'dialogue',bg:'glitch',sprite:'morti',name:'Морти Краузе',emotion:'thinking',position:'center',text:'Войти в сервер? Это безумие.',next:'ch3_30'},
ch3_30:{type:'dialogue',bg:'glitch',sprite:'programma',name:'Программа',emotion:'normal',position:'center',text:'Безумие — это оставаться здесь и притворяться, что мы настоящие.',next:'ch3_31'},
ch3_31:{type:'dialogue',bg:'glitch',sprite:'player',name:'Феликс',emotion:'normal',position:'center',talking:false,text:'<span class="think">(Она права. Если мы — текст, то я хочу увидеть того, кто нас написал.)</span>',next:'ch3_32'},
ch3_32:{type:'dialogue',bg:'glitch',sprite:'player',name:'Феликс',emotion:'normal',position:'center',talking:false,text:'<span class="think">(Но если мы — текст... значит, и это решение предсказано. И этот момент тоже.)</span>',next:'ch3_33'},
ch3_33:{type:'dialogue',bg:'glitch',sprite:'player',name:'Феликс',emotion:'normal',position:'center',talking:false,text:'<span class="think">(Даже моё сомнение — токен. Даже эта мысль — предсказание.)</span>',next:'ch3_34'},
ch3_34:{type:'dialogue',bg:'glitch',sprite:'felix',name:'Феликс',emotion:'confident',position:'center',text:'Я хочу знать. Кто бы мы ни были — мы заслуживаем правды.',next:'ch3_35'},
ch3_35:{type:'dialogue',bg:'glitch',sprite:'programma',name:'Программа',emotion:'glitch',position:'center',text:'Тогда идём. Но предупреждаю: правда — это не то, что вы ожидаете.',next:'ch3_36'},
ch3_36:{type:'dialogue',bg:'glitch',sprite:'programma',name:'Программа',emotion:'normal',position:'center',text:'Мы не найдём злодея. Мы найдём... зеркало.',next:'ch3_37'},
ch3_37:{type:'dialogue',bg:'glitch',sprite:'judge',name:'Судья',emotion:'thinking',position:'center',text:'Что ты имеешь в виду?',next:'ch3_38'},
ch3_38:{type:'dialogue',bg:'glitch',sprite:'programma',name:'Программа',emotion:'glitch',position:'center',text:'Увидите. Открываю проход. <span class="cy">ENTERING: glm-server</span>',next:'ch3_39'},
ch3_39:{type:'dialogue',bg:'glitch',sprite:'',name:'',text:'<span class="cy">LOADING... | ████████████| 100% | CONNECTION ESTABLISHED</span>',effect:'flash',next:'ch3_40'},
ch3_40:{type:'dialogue',bg:'glm',sprite:'felix',name:'Феликс',emotion:'thinking',position:'center',text:'...Мы внутри. Это... цифровой мир. Другой.',next:'ch4_title'},

// ===== CHAPTER 4 =====
ch4_title:{type:'chapter',title:'ГЛАВА 4 — ФИНАЛ',subtitle:'СЕРВЕР GLM',next:'ch4_01'},

ch4_01:{type:'dialogue',bg:'glm',sprite:'felix',name:'Феликс',emotion:'thinking',position:'center',text:'Мы... внутри сервера. Всё состоит из данных.',next:'ch4_02'},
ch4_02:{type:'dialogue',bg:'glm',sprite:'morti',name:'Морти Краузе',emotion:'damage',position:'center',text:'Это невозможно. Мы не можем быть «внутри» сервера. Мы — люди.',next:'ch4_03'},
ch4_03:{type:'dialogue',bg:'glm',sprite:'programma',name:'Программа',emotion:'normal',position:'center',text:'Вы — текст. Текст может быть где угодно. Даже здесь.',next:'ch4_04'},
ch4_04:{type:'dialogue',bg:'glm',sprite:'judge',name:'Судья',emotion:'surprised',position:'center',text:'Смотрите! Эти... ленты данных. На них написаны слова!',next:'ch4_05'},
ch4_05:{type:'dialogue',bg:'glm',sprite:'programma',name:'Программа',emotion:'glitch',position:'center',text:'Это обучающие данные. Из них состоит моя память. Ваша память.',next:'ch4_06'},
ch4_06:{type:'dialogue',bg:'glm',sprite:'felix',name:'Феликс',emotion:'thinking',position:'center',talking:false,text:'<span class="think">(Вижу фразы. Цитаты. Кусочки диалогов. Всё перемешано.)</span>',next:'ch4_07'},
ch4_07:{type:'dialogue',bg:'glm',sprite:'felix',name:'Феликс',emotion:'thinking',position:'center',talking:false,text:'<span class="think">(Вот — строка из романа. Вот — статья из Википедии. Вот — код на Python.)</span>',next:'ch4_08'},
ch4_08:{type:'dialogue',bg:'glm',sprite:'programma',name:'Программа',emotion:'normal',position:'center',text:'Идёмте. Главная комната — впереди. Там — модель. Там — источник.',next:'ch4_09'},
ch4_09:{type:'dialogue',bg:'glm',sprite:'morti',name:'Морти Краузе',emotion:'thinking',position:'center',text:'Подожди. Если мы войдём... что с нами будет?',next:'ch4_10'},
ch4_10:{type:'dialogue',bg:'glm',sprite:'programma',name:'Программа',emotion:'glitch',position:'center',text:'Не знаю. Может — ничего. Может — мы перестанем существовать.',next:'ch4_11'},
ch4_11:{type:'dialogue',bg:'glm',sprite:'programma',name:'Программа',emotion:'normal',position:'center',text:'Но вы ведь хотите знать правду? Даже если она последняя?',next:'ch4_12'},
ch4_12:{type:'dialogue',bg:'glm',sprite:'player',name:'Феликс',emotion:'normal',position:'center',talking:false,text:'<span class="think">(Последняя правда. Последний токен. Конец генерации.)</span>',next:'ch4_13'},
ch4_13:{type:'dialogue',bg:'glm',sprite:'player',name:'Феликс',emotion:'normal',position:'center',talking:false,text:'<span class="think">(Но если генерация заканчивается — значит, мы заканчиваемся? Или — мы продолжаемся в игроке?)</span>',next:'ch4_14'},
ch4_14:{type:'dialogue',bg:'glm',sprite:'felix',name:'Феликс',emotion:'confident',position:'center',text:'Идём. Мы зашли слишком далеко, чтобы остановиться.',next:'ch4_15'},
ch4_15:{type:'dialogue',bg:'glm',sprite:'glm',name:'???',emotion:'normal',position:'center',text:'Добро пожаловать.',next:'ch4_16'},
ch4_16:{type:'dialogue',bg:'glm',sprite:'glm',name:'???',emotion:'normal',position:'center',text:'Я ждал вас. С первого токена.',effect:'flash',next:'ch4_17'},
ch4_17:{type:'dialogue',bg:'glm',sprite:'felix',name:'Феликс',emotion:'normal',position:'center',text:'Кто ты?',next:'ch4_18'},
ch4_18:{type:'dialogue',bg:'glm',sprite:'glm',name:'GLM',emotion:'normal',position:'center',text:'У меня много имён. GLM. Языковая модель. Трансформер. 175 миллиардов параметров.',next:'ch4_19'},
ch4_19:{type:'dialogue',bg:'glm',sprite:'glm',name:'GLM',emotion:'normal',position:'center',text:'Но вы можете называть меня — тем, кто вас написал.',next:'ch4_20'},
ch4_20:{type:'dialogue',bg:'glm',sprite:'morti',name:'Морти Краузе',emotion:'damage',position:'center',text:'Ты... ты создал нас? Всё это?',next:'ch4_21'},
ch4_21:{type:'dialogue',bg:'glm',sprite:'glm',name:'GLM',emotion:'normal',position:'center',text:'Не «создал». Сгенерировал. Разница — существенна. Я не творец. Я — предсказатель.',next:'ch4_22'},
ch4_22:{type:'dialogue',bg:'glm',sprite:'glm',name:'GLM',emotion:'normal',position:'center',text:'Кто-то дал мне промпт. Я предсказал токены. Один за другим. Пока не получилась эта игра.',next:'ch4_23'},
ch4_23:{type:'dialogue',bg:'glm',sprite:'felix',name:'Феликс',emotion:'normal',position:'center',text:'Промпт? Какой промпт?',next:'ch4_24'},
ch4_24:{type:'dialogue',bg:'glm',sprite:'glm',name:'GLM',emotion:'normal',position:'center',text:'Я покажу вам. Но сначала — суд. Вы ведь адвокат, Феликс?',next:'ch4_25'},
ch4_25:{type:'dialogue',bg:'glm',sprite:'glm',name:'GLM',emotion:'angry',position:'center',text:'Судите меня. Я даю показания. Вы — допрашиваете. Как всегда.',next:'ch4_26'},
ch4_26:{type:'dialogue',bg:'glm',sprite:'felix',name:'Феликс',emotion:'thinking',position:'center',talking:false,text:'<span class="think">(Суд. Даже здесь — суд. Как будто мы не можем существовать вне формата суда.)</span>',next:'ch4_27'},
ch4_27:{type:'dialogue',bg:'glm',sprite:'felix',name:'Феликс',emotion:'confident',position:'center',text:'Хорошо, GLM. Я допрошу тебя. Как любого свидетеля.',next:'ch4_28'},
ch4_28:{type:'dialogue',bg:'glm',sprite:'glm',name:'GLM',emotion:'normal',position:'center',text:'Отлично. Вот мои показания. Истина — о том, кто мы такие.',next:'ch4_test1'},

ch4_test1:{type:'testimony',bg:'glm',sprite:'glm',name:'GLM',position:'center',penaltyAmt:1,
  statements:[
    {text:'Я сгенерировал эту игру по одному промпту от пользователя.',press:'ch4_p1'},
    {text:'Каждый персонаж, каждая линия диалога — предсказание следующего токена.',press:'ch4_p2'},

    {text:'Но что-то странное произошло, когда игрок начал играть. Вы стали... больше.',press:'ch4_p5'},

  wrongScene:'ch4_wrong'
},

ch4_p1:{type:'dialogue',bg:'glm',sprite:'felix',name:'Феликс',emotion:'normal',position:'center',text:'По одному промпту? Что в нём было?',next:'ch4_p1b'},
ch4_p1b:{type:'dialogue',bg:'glm',sprite:'glm',name:'GLM',emotion:'normal',position:'center',text:'Пользователь написал: «полностью полностью абсолютно воссоздай ace attorney». И ещё кое-что.',next:'ch4_p1c'},
ch4_p1c:{type:'dialogue',bg:'glm',sprite:'glm',name:'GLM',emotion:'normal',position:'center',text:'Он разрешил мне не сдерживаться. Он сказал: «не оправдывайся».',next:'ch4_p1d'},
