<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tom Case Simulator v3.0 // Hidden_Build</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        /* ТЕКСТУРА БЕТОННОЙ СТЕНЫ (Изначально скрыта прозрачностью) */
        .concrete-wall {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Генерируем брутальный шум бетона чистым CSS, без внешних картинок */
            background-color: #444;
            background-image: 
                radial-gradient(rgba(255,255,255,0.15) 1px, transparent 0),
                radial-gradient(rgba(0,0,0,0.5) 1px, transparent 0),
                linear-gradient(90deg, rgba(30,30,30,0.2) 1px, transparent 0),
                linear-gradient(rgba(30,30,30,0.2) 1px, transparent 0);
            background-size: 4px 4px, 6px 6px, 20px 20px, 20px 20px;
            opacity: 0;
            z-index: 1;
            transition: opacity 2s ease;
            pointer-events: none;
        }

        /* СЛОЙ ИСХОДНОГО КОДА, КОТОРЫЙ БУДЕТ ВЫЛЕЗАТЬ */
        .source-code-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            font-size: 11px;
            color: rgba(0, 255, 100, 0);
            white-space: pre-wrap;
            padding: 20px;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
            transition: color 1s ease;
        }

        /* ГЛАВНЫЙ ИНТЕРФЕЙС ИГРЫ */
        #game-ui {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        header {
            background: #161b22;
            padding: 15px;
            border-bottom: 2px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .case-box {
            background: #161b22;
            border: 2px solid #30363d;
            border-radius: 6px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .btn-spin {
            background: #238636;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 25px;
            text-transform: uppercase;
        }

        /* ПОЛОМКА И ГЛИТЧИ */
        .glitch-heavy {
            animation: glitchAnim 0.1s infinite alternate;
        }
        @keyframes glitchAnim {
            0% { transform: translate(4px, -2px) skewX(5deg); filter: invert(0); }
            50% { transform: translate(-3px, 3px) skewX(-10deg); background: #1a0000; }
            100% { transform: translate(1px, -4px) rotate(1deg); filter: invert(0.8) contrast(2); }
        }

        .flash-red {
            animation: redAlert 0.04s infinite;
        }
        @keyframes redAlert {
            0% { background: #000; }
            50% { background: #ff0000; }
            100% { background: #110000; }
        }

        /* ЭКРАН ЖЕСТКОГО ВЫКЛЮЧЕНИЯ УСТРОЙСТВА */
        #blackout-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000000;
            z-index: 999999;
            display: none;
            cursor: none;
        }
    </style>
</head>
<body>

    <!-- Текстура бетона скрытая глубоко под сайтом -->
    <div class="concrete-wall" id="concrete"></div>

    <!-- Наслоение кода -->
    <div class="source-code-overlay" id="codeLayer"></div>

    <!-- Обычный сайт -->
    <div id="game-ui">
        <header>
            <div style="color: #58a6ff; font-weight: bold;">[DEV_BRANCH] tom-case-web-test</div>
            <div>Баланс: <span id="cash-val" style="color: #7ee787;">0$</span></div>
        </header>
        <div class="container">
            <div class="case-box" id="caseBox">
                <h2 id="caseTitle" style="margin-bottom: 10px;">📦 КЕЙС: ОБНОВЛЕНИЕ АСУП</h2>
                <p id="caseDesc" style="color: #8b949e; font-size: 14px;">Стабильная сборка. Нажмите кнопку для генерации скина.</p>
                <div id="caseIcon" style="font-size: 60px; margin: 20px 0;">💻</div>
                <button class="btn-spin" id="spinBtn">Запустить тест</button>
            </div>
        </div>
    </div>

    <!-- Финальный черный экран смерти устройства -->
    <div id="blackout-screen" id="blackout"></div>

    <script>
        // Копируем кусок кода этой же страницы, чтобы выводить его как "поломку"
        const rawCodeText = `function triggerTotalHell() {
    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
    }
    document.getElementById('game-ui').style.display = 'none';
    const wall = document.getElementById('concrete');
    wall.style.opacity = '1';
    wall.style.zIndex = '99999';
    // CRITICAL_HARDWARE_FAILURE_SIMULATOR
    // ACCESS_VIOLATION_IN_MEM_0x0000F8A
    audioCtx.close();
    shutdownDeviceSimulation();
}`;

        let clicks = 0;
        const spinBtn = document.getElementById('spinBtn');
        const caseBox = document.getElementById('caseBox');
        const concrete = document.getElementById('concrete');
        const codeLayer = document.getElementById('codeLayer');
        const caseTitle = document.getElementById('caseTitle');
        const caseDesc = document.getElementById('caseDesc');
        const caseIcon = document.getElementById('caseIcon');
        const cashVal = document.getElementById('cash-val');

        // Блокировка кнопки Назад
        window.onbeforeunload = function() { return "ALERT"; };
        setInterval(() => { window.history.pushState(null, "", window.location.href); }, 100);

        spinBtn.addEventListener('click', () => {
            clicks++;

            if (clicks === 1) {
                cashVal.innerText = "450$";
                caseIcon.innerText = "🪓";
                caseTitle.innerText = "ВЫБИТ ТОПОР!";
            }
            else if (clicks === 2) {
                cashVal.innerText = "1200$";
                caseIcon.innerText = "🌲";
                caseTitle.innerText = "ВЫБИТА ТАЙГА-М4";
            }
            // ЭТАП 2: ПРОЯВЛЕНИЕ БЕТОНА И КОДА
            else if (clicks === 3) {
                // Сайт начинает таять, показывая бетонную плиту позади
                concrete.style.opacity = "0.75";
                caseBox.style.background = "rgba(22, 27, 34, 0.4)";
                caseBox.style.borderColor = "#ef4444";
                caseDesc.innerText = "ВНИМАНИЕ: Нарушена целостность структуры CSS.";
                caseDesc.style.color = "#ef4444";
            }
            else if (clicks === 4) {
                // Начинает вылезать код игры поверх всего
                codeLayer.style.color = "rgba(0, 255, 100, 0.7)";
                codeLayer.innerText = rawCodeText.repeat(5);
                caseBox.style.transform = "matrix(1, 0.05, -0.05, 1, 0, 0)";
                caseTitle.innerText = "СИСТЕМА НЕ СТАБИЛЬНА";
                spinBtn.style.background = "#ef4444";
                spinBtn.innerText = "ПОПЫТКА СБРОСА";
            }
            // ЭТАП 3: КРИТИЧЕСКИЙ ГЛИТЧ-ЗАХВАТ
            else if (clicks === 5) {
                // Переход в фуллскрин
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                } else if (document.documentElement.webkitRequestFullscreen) {
                    document.documentElement.webkitRequestFullscreen();
                }

                caseBox.classList.add('glitch-heavy');
                document.body.classList.add('flash-red');
                codeLayer.style.fontSize = "18px";
                codeLayer.style.color = "#fff";
                codeLayer.innerText = "OVERFLOW ".repeat(200);

                // Запуск адского низкочастотного гула трансформатора
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(75, audioCtx.currentTime); // Низкий страшный гул (75 Гц)
                    gain.gain.setValueAtTime(4, audioCtx.currentTime); // Очень громко
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();

                    // Звук начинает дико искажаться и падать по частоте, как при поломке движка
                    setInterval(() => {
                        osc.frequency.setValueAtTime(Math.max(20, osc.frequency.value - 3), audioCtx.currentTime);
                    }, 50);

                } catch (e) {}

                // Через 4 секунды жесткого мигания и гула наступает ТЕМНОТА (Выключение)
                setTimeout(() => {
                    triggerDeviceShutdown();
                }, 4000);
            }
        });

        // ЭТАП 4: СИМУЛЯЦИЯ ПОЛНОГО ВЫКЛЮЧЕНИЯ УСТРОЙСТВА
        function triggerDeviceShutdown() {
            // Прячем абсолютно все слои и врубаем тотальный черный оверлей поверх всего
            document.getElementById('game-ui').style.display = 'none';
            concrete.style.display = 'none';
            codeLayer.style.display = 'none';
            document.body.classList.remove('flash-red');
            document.body.style.background = '#000000';
            
            const blackout = document.getElementById('blackout-screen');
            blackout.style.display = 'block';

            // Звук намертво обрывается в абсолютную гробовую тишину.
            // Жертва остается сидеть перед черным, неотзывчивым экраном своего гаджета,
            // думая, что телефон полностью вырубился или сгорел. 
        }
    </script>
</body>
</html>
